<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <script>(function(){try{var t=localStorage.getItem('theme');if(t){document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t}else if(window.matchMedia('(prefers-color-scheme:light)').matches){document.documentElement.setAttribute('data-theme','light');document.documentElement.style.colorScheme='light'}else{document.documentElement.style.colorScheme='dark'};var m=document.querySelector('meta[name="color-scheme"]')||function(){var e=document.createElement('meta');e.name='color-scheme';document.head.appendChild(e);return e}();m.content=document.documentElement.style.colorScheme}catch(e){}})()</script>
    <script>!function(){var d=document.documentElement;new MutationObserver(function(){document.body&&(document.body.setAttribute('data-theme',d.getAttribute('data-theme')||'dark'),this.disconnect())}).observe(d,{childList:!0,subtree:!0})}()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        .modal-backdrop{z-index:1050!important}.modal{z-index:1055!important}
        :root {
            --login-bg-card: rgba(15, 23, 42, 0.75);
            --login-bg-input: rgba(255, 255, 255, 0.06);
            --login-border-input: rgba(255, 255, 255, 0.15);
            --login-text-input: #e2e8f0;
            --login-text-label: #94a3b8;
            --login-color-primary: #667eea;
            --login-gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --login-color-error: #f87171;
            --login-color-success: #34d399;
            --login-text-version: rgba(255, 255, 255, 0.35);
            --login-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        [data-theme="light"] {
            --login-bg-card: rgba(255, 255, 255, 0.85);
            --login-bg-input: rgba(255, 255, 255, 0.9);
            --login-border-input: rgba(99, 102, 241, 0.2);
            --login-text-input: #334155;
            --login-text-label: #64748b;
            --login-color-primary: #6366f1;
            --login-gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --login-color-error: #ef4444;
            --login-color-success: #10b981;
            --login-text-version: #94a3b8;
            --login-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
        }
        .login-page {
            background-image: url('https://cn-img.owoser.cn/images/2022/11/08/adc63889cad0409392e7e44ac0e48fd8.png') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
        }
        .login-card {
            position: relative;
        }
        .login-field-error {
            color: var(--login-color-error);
            font-size: 0.82rem;
            margin-top: 4px;
            min-height: 20px;
            display: block;
            text-shadow: 0 0 8px var(--login-color-error), 0 0 16px var(--login-color-error);
            transition: opacity 0.2s ease, color 0.3s ease;
        }
        .login-form-error {
            color: var(--login-color-error);
            font-size: 0.85rem;
            padding: 10px 14px;
            background: rgba(255, 107, 114, 0.08);
            border: 1px solid var(--login-color-error);
            border-radius: 10px;
            margin-bottom: 12px;
            text-shadow: 0 0 8px var(--login-color-error), 0 0 16px var(--login-color-error);
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        /* 覆盖 Bootstrap card 样式以适配玻璃态 */
        .login-card .card {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }
        .login-card .card-header {
            display: none;
        }
        .login-card .card-body {
            padding: 0;
        }
        .login-card .form-control {
            background: var(--login-bg-input);
            border: 1px solid var(--login-border-input);
            color: var(--login-text-input);
            border-radius: 10px;
            padding: 12px 16px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card .form-control:focus {
            background: var(--login-bg-input);
            border-color: var(--login-color-primary);
            box-shadow: 0 0 0 3px var(--login-color-primary);
            color: var(--login-text-input);
        }
        .login-card .form-label {
            color: var(--login-text-label);
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .login-card .btn-primary {
            background: var(--login-gradient-primary);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .login-card .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--login-color-primary);
        }
        .login-card .btn-outline-secondary {
            background: transparent;
            border: 1px solid var(--login-border-input);
            color: var(--login-text-label);
            border-radius: 10px;
            padding: 12px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card .btn-outline-secondary:hover {
            border-color: var(--login-color-primary);
            color: var(--login-text-input);
        }
        .login-card .btn-link {
            color: var(--login-color-primary) !important;
            text-decoration: none;
            font-size: 13px;
            transition: opacity 0.2s ease, color 0.3s ease;
        }
        .login-card .btn-link:hover {
            opacity: 0.8;
        }
        .login-card .alert-success {
            background: rgba(52, 211, 153, 0.12) !important;
            border: 1px solid var(--login-color-success) !important;
            color: var(--login-color-success) !important;
            border-radius: 10px;
            font-size: 13px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .login-card .alert-danger {
            background: rgba(239, 68, 68, 0.12) !important;
            border: 1px solid var(--login-color-error) !important;
            color: var(--login-color-error) !important;
            border-radius: 10px;
            font-size: 13px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .login-card h5, .login-card h6 {
            color: var(--login-text-input);
            transition: color 0.3s ease;
        }
        .login-card .text-muted {
            color: var(--login-text-label) !important;
            transition: color 0.3s ease;
        }
        .login-card .text-primary {
            color: var(--login-color-primary) !important;
            transition: color 0.3s ease;
        }
        /* 底部版本信息样式 */
        .login-version-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: var(--login-text-version);
            font-size: 12px;
            z-index: 1;
            transition: color 0.3s ease;
        }
        /* 毛玻璃效果 */
        [data-theme="light"] .login-card,
        [data-theme="dark"] .login-card {
            background: var(--login-bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            box-shadow: var(--login-shadow);
        }
        /* 主题切换按钮图标显示隐藏 */
        [data-theme="dark"] .theme-icon-sun { display: block; }
        [data-theme="dark"] .theme-icon-moon { display: none; }
        [data-theme="light"] .theme-icon-sun { display: none; }
        [data-theme="light"] .theme-icon-moon { display: block; }
    </style>
</head>
<body class="login-page">

    <!-- Glassmorphism Login Card -->
    <div class="login-card">
        <!-- Theme Toggle Button -->
        <div style="position:absolute;top:12px;right:12px;">
            <button id="themeToggle" style="background:none;border:1px solid var(--login-border-input);border-radius:8px;width:36px;height:36px;cursor:pointer;color:var(--login-text-label);display:flex;align-items:center;justify-content:center;transition:all 0.3s ease;" title="切换主题" aria-label="切换主题">
                <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <!-- Card Header: Logo / Title -->
        <div class="login-logo">PVE Panel</div>
        <div class="login-subtitle">欢迎回来，请登录您的账户</div>

        <!-- Vue Mount Point -->
        <div id="app"></div>
    </div>

    <template id="appTemplate">
        <div>
            <div v-if="!showResetPassword" class="row justify-content-center">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">登录</h5>
                        </div>
                        <div class="card-body">
                            <div v-if="!showTwofaInput">
                                <form @submit.prevent="login" novalidate>
                                    <div class="mb-3">
                                        <label class="form-label" for="login-username">用户名</label>
                                        <input type="text" class="form-control" id="login-username" name="username" autocomplete="username" v-model="loginForm.username" @input="clearLoginErrors" required>
                                        <span class="login-field-error" v-if="loginUsernameError">{{ loginUsernameError }}</span>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label" for="login-password">密码</label>
                                        <input type="password" class="form-control" id="login-password" name="password" autocomplete="current-password" v-model="loginForm.password" @input="clearLoginErrors" required>
                                        <span class="login-field-error" v-if="loginPasswordError">{{ loginPasswordError }}</span>
                                    </div>
                                    <div class="login-form-error" v-if="loginError">{{ loginError }}</div>
                                    <button type="submit" class="btn btn-primary w-100">登录</button>
                                </form>
                                <div class="mt-3 text-center">
                                    <button type="button" class="btn btn-link text-primary p-0" @click="showResetPassword = true">忘记密码？</button>
                                </div>
                            </div>
                            <div v-else>
                                <div class="text-center mb-3">
                                    <h6 class="mb-1">双重验证</h6>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="twofa-code">验证码</label>
                                    <input type="text" class="form-control" id="twofa-code" autocomplete="one-time-code" v-model="twofaCode" @input="twofaError = ''" @keyup="handleTwofaInput" @keydown.enter.prevent="verifyTwofa" ref="twofaInputRef" maxlength="30" placeholder="输入 6 位验证码或恢复码">
                                    <span class="login-field-error" v-if="twofaError">{{ twofaError }}</span>
                                </div>
                                <p class="text-muted small text-center mb-3" style="font-size:0.82rem;line-height:1.5;">请输入身份验证器中的 6 位验证码，或使用恢复码登录</p>
                                <button type="button" class="btn btn-primary w-100 mb-2" @click="verifyTwofa">验证</button>
                                <button type="button" class="btn btn-outline-secondary w-100" @click="backToLogin">返回</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-else class="row justify-content-center">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">重置密码</h5>
                        </div>
                        <div class="card-body">
                            <div v-if="!resetTokenValidated">
                                <form @submit.prevent="requestPasswordReset">
                                    <div class="mb-3">
                                        <label class="form-label" for="reset-email">邮箱地址</label>
                                        <input type="email" class="form-control" id="reset-email" name="email" autocomplete="email" v-model="resetEmail" required>
                                    </div>
                                    <div v-if="resetMessage" class="alert alert-success">{{ resetMessage }}</div>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">发送重置链接</button>
                                        <button type="button" class="btn btn-outline-secondary" @click="showResetPassword = false">返回</button>
                                    </div>
                                </form>
                            </div>
                            <div v-else>
                                <form @submit.prevent="resetPassword">
                                    <div class="mb-3">
                                        <label class="form-label" for="new-password">新密码</label>
                                        <input type="password" class="form-control" id="new-password" name="new-password" autocomplete="new-password" v-model="newPassword" required minlength="6">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label" for="confirm-password">确认密码</label>
                                        <input type="password" class="form-control" id="confirm-password" name="confirm-password" autocomplete="new-password" v-model="confirmPassword" required minlength="6">
                                    </div>
                                    <div v-if="resetError" class="alert alert-danger">{{ resetError }}</div>
                                    <div v-if="resetSuccess" class="alert alert-success">{{ resetSuccess }}</div>
                                    <button type="submit" class="btn btn-primary w-100">重置密码</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <Teleport to="body">

            <div class="modal fade" id="customAlertModal" tabindex="-1" data-bs-backdrop="static">
                <div class="modal-dialog modal-sm modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-body text-center py-4">
                            <div class="custom-alert-icon mb-3" aria-hidden="true">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                            </div>
                            <p class="custom-alert-msg mb-0" style="color:var(--text-primary);font-size:14px;line-height:1.6;">{{ customAlertMessage }}</p>
                        </div>
                        <div class="modal-footer justify-content-center border-0 pt-0 pb-4">
                            <button type="button" class="btn btn-primary px-4" data-bs-dismiss="modal">确定</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="customConfirmModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
                <div class="modal-dialog modal-sm modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-body text-center py-4">
                            <div class="custom-alert-icon mb-3" aria-hidden="true">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ffc107" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                                </svg>
                            </div>
                            <p class="custom-alert-msg mb-0" style="color:var(--text-primary);font-size:14px;line-height:1.6;">{{ customConfirmMessage }}</p>
                        </div>
                        <div class="modal-footer justify-content-center border-0 pt-0 pb-4 gap-3">
                            <button type="button" class="btn btn-outline-light px-3" @click="confirmCancel">取消</button>
                            <button type="button" class="btn btn-primary px-3" @click="confirmOk">确定</button>
                        </div>
                    </div>
                </div>
            </div>

            </Teleport>

            <!-- C-2 修复：强制改密模态框 -->
            <Teleport to="body">
            <div v-if="showForceChangePwd" class="modal-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1060">
                <div class="glass-card" style="max-width:420px;margin:15vh auto;padding:24px;border-radius:16px;text-align:center;background:var(--login-bg-card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)">
                    <h3 style="margin-bottom:12px;color:var(--login-text-input)">首次登录 - 强制修改密码</h3>
                    <p style="color:var(--login-text-label);margin-bottom:16px;font-size:13px">为了账户安全，请设置一个新的登录密码</p>
                    <input type="password" v-model="forceNewPassword" placeholder="新密码（至少8位）" style="width:100%;padding:10px 14px;margin-bottom:10px;border-radius:8px;border:1px solid var(--login-border-input);background:var(--login-bg-input);color:var(--login-text-input);outline:none;box-sizing:border-box;font-size:14px" @keyup.enter="submitForceChangePwd" />
                    <input type="password" v-model="forceConfirmPassword" placeholder="确认新密码" style="width:100%;padding:10px 14px;margin-bottom:10px;border-radius:8px;border:1px solid var(--login-border-input);background:var(--login-bg-input);color:var(--login-text-input);outline:none;box-sizing:border-box;font-size:14px" @keyup.enter="submitForceChangePwd" />
                    <div v-if="forcePwdError" style="color:var(--login-color-error);font-size:12px;margin-bottom:12px">{{ forcePwdError }}</div>
                    <button type="button" @click="submitForceChangePwd" style="width:100%;padding:10px;border:none;border-radius:8px;background:var(--login-gradient-primary);color:#fff;font-size:14px;cursor:pointer;font-weight:600">确认修改</button>
                </div>
            </div>
            </Teleport>
        </div>
    </template>

    <!-- Version Info (Fixed at Bottom) -->
    <div class="login-version-info">
        PVE 管理面板 <span id="appVersion"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.11/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        function getDeviceName() {
            const ua = navigator.userAgent;
            let browser = '浏览器';
            if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            let os = '';
            if (ua.includes('HarmonyOS') || ua.includes('鸿蒙') || ua.includes('OpenHarmony')) os = '鸿蒙';
            else if (ua.includes('Windows NT 11')) os = 'Win11';
            else if (ua.includes('Windows NT 10')) os = 'Win10';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac OS X')) os = 'macOS';
            else if (ua.includes('iPhone')) os = 'iPhone';
            else if (ua.includes('iPad')) os = 'iPad';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('Linux')) os = 'Linux';
            return os ? browser + ' / ' + os : browser;
        }

        const App = {
            template: '#appTemplate',
            setup() {
                const loginForm = ref({ username: '', password: '' });
                const loginError = ref('');
                const loginUsernameError = ref('');
                const loginPasswordError = ref('');
                const showResetPassword = ref(false);
                const resetEmail = ref('');
                const resetMessage = ref('');
                const resetTokenValidated = ref(false);
                const resetToken = ref('');
                const newPassword = ref('');
                const confirmPassword = ref('');
                const resetError = ref('');
                const resetSuccess = ref('');
                const customAlertMessage = ref('');
                const customConfirmMessage = ref('');
                const customConfirmResolve = ref(null);

                const showTwofaInput = ref(false);
                const partialToken = ref('');
                const pendingRefreshToken = ref('');
                const twofaCode = ref('');
                const twofaError = ref('');
                const twofaInputRef = ref(null);

                // C-2 修复：强制改密状态
                const showForceChangePwd = ref(false);
                const forceNewPassword = ref('');
                const forceConfirmPassword = ref('');
                const forcePwdError = ref('');

                setupCustomAlert(customAlertMessage);
                setupCustomConfirm(customConfirmMessage, customConfirmResolve);

                const confirmOk = () => {
                    const resolve = customConfirmResolve.value;
                    if (resolve) {
                        customConfirmResolve.value = null;
                        resolve(true);
                    }
                    const el = document.getElementById('customConfirmModal');
                    if (el) {
                        const modal = bootstrap.Modal.getInstance(el);
                        if (modal) modal.hide();
                    }
                };

                const confirmCancel = () => {
                    const resolve = customConfirmResolve.value;
                    if (resolve) {
                        customConfirmResolve.value = null;
                        resolve(false);
                    }
                    const el = document.getElementById('customConfirmModal');
                    if (el) {
                        const modal = bootstrap.Modal.getInstance(el);
                        if (modal) modal.hide();
                    }
                };

                const login = async () => {
                    loginError.value = '';
                    loginUsernameError.value = '';
                    loginPasswordError.value = '';
                    // 前端空值校验
                    let hasError = false;
                    if (!loginForm.value.username.trim()) {
                        loginUsernameError.value = '用户名不能为空';
                        hasError = true;
                    }
                    if (!loginForm.value.password) {
                        loginPasswordError.value = '登录密码不能为空';
                        hasError = true;
                    }
                    if (hasError) return;
                    try {
                        const body = { ...loginForm.value };
                        body.device_name = getDeviceName();
                        const data = await api('/login', {
                            method: 'POST',
                            body: JSON.stringify(body)
                        });
                        if (data.twofa_required) {
                            partialToken.value = data.partial_token;
                            pendingRefreshToken.value = data.refresh_token || '';
                            showTwofaInput.value = true;
                            twofaCode.value = '';
                            twofaError.value = '';
                            await nextTick();
                            const inputEl = document.getElementById('twofa-code');
                            if (inputEl) inputEl.focus();
                            return;
                        }
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('refreshToken', data.refreshToken);

                        // C-2 修复：强制改密检查
                        if (data.must_change_password) {
                            showForceChangePwd.value = true;
                            forceNewPassword.value = '';
                            forceConfirmPassword.value = '';
                            forcePwdError.value = '';
                            return;
                        }

                        // 获取用户信息，判断角色
                        const userData = await api('/user/profile');
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } catch (e) {
                        if (e.message.includes('网络') || e.message.includes('fetch') || e.message.includes('NetworkError') || e.message.includes('Failed to fetch')) {
                            loginError.value = '服务器连接异常，请稍后再试';
                        } else {
                            loginError.value = e.message;
                        }
                    }
                };

                const clearLoginErrors = () => {
                    loginError.value = '';
                    loginUsernameError.value = '';
                    loginPasswordError.value = '';
                };

                const verifyTwofa = async () => {
                    twofaError.value = '';
                    const code = twofaCode.value.trim();
                    if (!code) {
                        twofaError.value = '请输入验证码';
                        return;
                    }
                    try {
                        const data = await api('/login/2fa', {
                            method: 'POST',
                            body: JSON.stringify({
                                partial_token: partialToken.value,
                                code: code,
                                refresh_token: pendingRefreshToken.value
                            })
                        });
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('refreshToken', data.refreshToken);

                        // C-2 修复：强制改密检查（2FA 登录）
                        if (data.must_change_password) {
                            showForceChangePwd.value = true;
                            forceNewPassword.value = '';
                            forceConfirmPassword.value = '';
                            forcePwdError.value = '';
                            return;
                        }

                        const userData = await api('/user/profile');
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } catch (e) {
                        if (e.message.includes('网络') || e.message.includes('fetch') || e.message.includes('NetworkError') || e.message.includes('Failed to fetch')) {
                            twofaError.value = '服务器连接异常，请稍后再试';
                        } else {
                            twofaError.value = e.message;
                        }
                    }
                };

                const backToLogin = () => {
                    showTwofaInput.value = false;
                    partialToken.value = '';
                    pendingRefreshToken.value = '';
                    twofaCode.value = '';
                    twofaError.value = '';
                };

                const handleTwofaInput = (e) => {
                    twofaCode.value = e.target.value;
                };

                const requestPasswordReset = async () => {
                    try {
                        await api('/auth/forgot-password', {
                            method: 'POST',
                            body: JSON.stringify({ email: resetEmail.value })
                        });
                        resetMessage.value = '如果该邮箱已绑定，重置链接已发送！';
                    } catch (e) {
                        resetMessage.value = '如果该邮箱已绑定，重置链接已发送！';
                    }
                };

                const resetPassword = async () => {
                    try {
                        resetError.value = '';
                        resetSuccess.value = '';
                        if (newPassword.value !== confirmPassword.value) {
                            resetError.value = '两次输入的密码不一致！';
                            return;
                        }
                        await api('/auth/reset-password', {
                            method: 'POST',
                            body: JSON.stringify({ token: resetToken.value, newPassword: newPassword.value })
                        });
                        resetSuccess.value = '密码重置成功！';
                        setTimeout(() => {
                            showResetPassword.value = false;
                            resetTokenValidated.value = false;
                        }, 2000);
                    } catch (e) {
                        resetError.value = e.message;
                    }
                };

                // C-2 修复：提交强制改密
                const submitForceChangePwd = async () => {
                    forcePwdError.value = '';
                    const newPwd = forceNewPassword.value;
                    const confirmPwd = forceConfirmPassword.value;

                    if (!newPwd || newPwd.length < 8) {
                        forcePwdError.value = '密码长度至少8位';
                        return;
                    }
                    if (newPwd !== confirmPwd) {
                        forcePwdError.value = '两次输入的密码不一致';
                        return;
                    }

                    try {
                        await api('/user/profile', {
                            method: 'PUT',
                            body: JSON.stringify({ password: newPwd })
                        });
                        // 改密成功，获取角色信息后跳转
                        const userData = await api('/user/profile');
                        showForceChangePwd.value = false;
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    } catch (e) {
                        forcePwdError.value = e.message || '修改失败，请重试';
                    }
                };

                onMounted(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const resetTokenParam = urlParams.get('resetPassword');

                    if (resetTokenParam) {
                        showResetPassword.value = true;
                        resetToken.value = resetTokenParam;
                        fetch('/api/auth/reset-password/' + resetTokenParam).then(res => {
                            if (res.ok) {
                                resetTokenValidated.value = true;
                            } else {
                                resetError.value = '链接无效或已过期';
                            }
                        }).catch(err => {
                            resetError.value = '链接无效或已过期';
                        });
                        window.history.replaceState({}, document.title, window.location.pathname);
                        return;
                    }

                    // 检查是否已登录
                    const token = localStorage.getItem('token');
                    if (token) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                });

                return {
                    loginForm,
                    loginError,
                    loginUsernameError,
                    loginPasswordError,
                    showResetPassword,
                    resetEmail,
                    resetMessage,
                    resetTokenValidated,
                    resetToken,
                    newPassword,
                    confirmPassword,
                    resetError,
                    resetSuccess,
                    customAlertMessage,
                    customConfirmMessage,
                    showTwofaInput,
                    twofaCode,
                    twofaError,
                    twofaInputRef,
                    // C-2 修复：强制改密
                    showForceChangePwd,
                    forceNewPassword,
                    forceConfirmPassword,
                    forcePwdError,
                    login,
                    clearLoginErrors,
                    verifyTwofa,
                    backToLogin,
                    handleTwofaInput,
                    requestPasswordReset,
                    resetPassword,
                    submitForceChangePwd,
                    confirmOk,
                    confirmCancel
                };
            }
        };

        createApp(App).mount('#app');
    </script>
<script>fetch("/api/version").then(function(r){return r.json()}).then(function(d){var el=document.getElementById("appVersion");if(el)el.textContent="v"+d.version})</script>
<script>
(function() {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        document.documentElement.style.colorScheme = next;
        var cm = document.querySelector('meta[name="color-scheme"]');
        if (cm) cm.content = next;
        if (document.body) document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });
})();
</script>
