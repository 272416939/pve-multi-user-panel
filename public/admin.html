<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>.modal-backdrop{z-index:1050!important}.modal{z-index:1055!important}</style>
</head>
<body>
    <template id="appTemplate">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4">
            <div class="container">
                <a class="navbar-brand" :href="user && user.role === 'admin' ? 'admin.html?section=vms' : 'dashboard.html'">PVE 多用户控制面板</a>
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" v-for="item in navItems" :key="item.id">
                        <a class="nav-link" :class="{ active: activeSection === item.id }" href="#" @click.prevent="switchSection(item.id)">{{ item.label }}</a>
                    </li>
                </ul>
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="btn btn-link text-white position-relative me-2 p-1" href="user-center.html#messages" aria-label="消息" title="消息" style="text-decoration:none;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span v-if="unreadCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:10px; min-width:16px;">
                            {{ unreadCount > 99 ? '99+' : unreadCount }}
                        </span>
                    </a>
                    <div class="dropdown" v-if="user">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <img v-if="user.avatar" :src="user.avatar" alt="" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover; margin-right: 5px;">
                            <img v-else :src="getGeekAvatar(user.username)" alt="" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover; margin-right: 5px;">
                            {{ user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="user-center.html">用户中心</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div v-if="!user" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2 text-muted">正在验证登录状态...</p>
            </div>

            <div v-else>
                <!-- 虚拟机管理区域 -->
                <div v-if="activeSection === 'vms'">
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: activeTabVm === 'manage' }" @click="activeTabVm = 'manage'">虚拟机管理</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: activeTabVm === 'assign' }" @click="activeTabVm = 'assign'">分配虚拟机</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: activeTabVm === 'network' }" @click="activeTabVm = 'network'">网络</button>
                        </li>
                    </ul>
                    <div v-if="activeTabVm === 'manage'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="mb-0">虚拟机管理</h4>
                            <button class="btn btn-primary btn-sm" @click="openCdkRedeem">CDK 兑换</button>
                        </div>
                    <div v-if="vmsLoading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2 text-muted">加载中...</p>
                    </div>
                    <div v-else class="row g-3">
                        <div v-for="vm in userVms" :key="vm.id" class="col-md-6 d-flex">
                            <div class="card vm-card h-100 w-100" :class="{ expired: vm.isExpired, destroyed: vm.destroyed }">
                                <div class="card-body d-flex flex-column">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="card-title mb-0">{{ vm.name || 'VM ' + vm.vm_id }}</h5>
                                        <span v-if="vm.status" :class="vm.status.status === 'running' ? 'status-running' : 'status-stopped'">
                                            {{ vm.status.status === 'running' ? '运行中' : '已停止' }}
                                        </span>
                                    </div>
                                    <div class="text-muted small mb-2">
                                        <strong>VM ID:</strong> {{ vm.vm_id }}
                                        <span class="ms-3"><strong>用户:</strong> {{ vm.username || '-' }}</span>
                                        <span v-if="vm.status && vm.status.status === 'running' && vm.status.uptime !== undefined" class="ms-3">
                                            <strong>运行时长:</strong> {{ formatUptime(vm.status.uptime) }}
                                        </span>
                                    </div>
                                    <div v-if="vm.config" class="mb-2">
                                        <div class="row">
                                            <div class="col-6">
                                                <small class="vm-label">CPU:</small> {{ vm.config.sockets || 1 }} x {{ vm.config.cores || 1 }} 核
                                            </div>
                                            <div class="col-6">
                                                <small class="vm-label">内存:</small> {{ formatMemory(vm.config.memory) }}
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="vm.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="vm.status.cpu !== undefined">
                                                <small class="vm-label">CPU 使用率:</small> {{ (vm.status.cpu * 100).toFixed(1) }}%
                                            </div>
                                            <div class="col-6" v-if="vm.status.mem !== undefined && vm.config">
                                                <small class="vm-label">内存使用率:</small> {{ ((vm.status.mem / (vm.config.memory * 1024 * 1024)) * 100).toFixed(1) }}%
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="vm.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="vm.status.netin !== undefined || vm.status.netout !== undefined">
                                                <small class="vm-label">网络流量:</small>
                                                <span v-if="vm.status.netin !== undefined">↓{{ formatBytes(vm.status.netin) }}/s 下载</span>
                                                <span v-if="vm.status.netin !== undefined && vm.status.netout !== undefined"> / </span>
                                                <span v-if="vm.status.netout !== undefined">↑{{ formatBytes(vm.status.netout) }}/s 上传</span>
                                            </div>
                                            <div class="col-6" v-if="vm.status.diskread !== undefined || vm.status.diskwrite !== undefined">
                                                <small class="vm-label">磁盘IO:</small>
                                                <span v-if="vm.status.diskread !== undefined">↓{{ formatBytes(vm.status.diskread) }}/s 读</span>
                                                <span v-if="vm.status.diskread !== undefined && vm.status.diskwrite !== undefined"> / </span>
                                                <span v-if="vm.status.diskwrite !== undefined">↑{{ formatBytes(vm.status.diskwrite) }}/s 写</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">到期时间:</small> {{ vm.expiration_date ? formatDate(vm.expiration_date) : '无限期' }}
                                        <span v-if="vm.isExpired" class="badge bg-warning ms-2">已过期</span>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">续费价格:</small> {{ vm.renewal_price || '暂无' }}
                                    </div>
                                    <div class="d-flex gap-2 mt-auto flex-wrap align-items-center">
                                        <!-- 电源控制 -->
                                        <div class="btn-group">
                                            <button class="btn btn-success btn-sm" @click="startVm(vm.vm_id)" :disabled="!vm.status || vm.status.status === 'running'">启动</button>
                                            <button class="btn btn-warning btn-sm text-white" @click="requestConfirm(vm.id, 'shutdown')" :disabled="!vm.status || vm.status.status !== 'running'" title="安全关机">关机</button>
                                            <button class="btn btn-secondary btn-sm" @click="requestConfirm(vm.id, 'reboot')" :disabled="!vm.status || vm.status.status !== 'running'" title="重启">重启</button>
                                            <button class="btn btn-danger btn-sm" @click="requestConfirm(vm.id, 'stop')" :disabled="!vm.status || vm.status.status !== 'running'" title="强制停止">停止</button>
                                        </div>
                                        <!-- VNC -->
                                        <button class="btn btn-info btn-sm text-white" @click="openVncConsole(vm.vm_id)" :disabled="!vm.status || vm.status.status !== 'running'" title="打开 VNC 控制台">VNC</button>
                                        <!-- 网络 -->
                                        <button class="btn btn-outline-info btn-sm text-white" @click="openDeviceForward(vm, 'vm')" title="端口转发管理">网络</button>
                                        <!-- 管理 -->
                                        <div class="btn-group">
                                            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">管理</button>
                                            <ul class="dropdown-menu">
                                                <li><button class="dropdown-item" @click="openSnapshotPanel(vm)">快照</button></li>
                                                <li><button class="dropdown-item" @click="openBackupPanel(vm)">备份</button></li>
                                                <li><hr class="dropdown-divider"></li>
                                                <li><button class="dropdown-item" @click="editVm(vm)">编辑</button></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div v-if="vm.destroyed" class="destroyed-overlay">
                                    <div class="destroyed-overlay-content">
                                        <svg class="destroyed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="12" y1="8" x2="12" y2="12"/>
                                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                                        </svg>
                                        <div class="destroyed-title">该虚拟机已被销毁</div>
                                        <div class="destroyed-desc mb-3">请联系管理员处理</div>
                                        <button class="btn btn-danger btn-sm" @click="removeVmById(vm.id)">移除此分配</button>
                                    </div>
                                </div>
                                <div v-if="confirmState.vmId === vm.id" class="confirm-overlay">
                                    <div class="confirm-overlay-content">
                                        <svg class="confirm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                            <line x1="12" y1="9" x2="12" y2="13"/>
                                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                                        </svg>
                                        <div class="confirm-title">确认操作</div>
                                        <div class="confirm-desc mb-3">{{ confirmActionText }}</div>
                                        <div class="d-flex gap-2 justify-content-center">
                                            <button class="btn btn-danger btn-sm" @click="confirmAction(vm)">确认</button>
                                            <button class="btn btn-outline-light btn-sm" @click="cancelConfirm">取消</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-if="!vmsLoading && userVms.length === 0" class="text-muted text-center py-4">
                        暂无虚拟机
                    </div>
                    </div>
                    <div v-if="activeTabVm === 'assign'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="mb-0">分配虚拟机</h4>
                            <button class="btn btn-warning btn-sm" @click="checkExpired">
                                立即检查过期虚拟机
                            </button>
                        </div>
                        <div class="card mb-4">
                            <div class="card-body">
                                <form @submit.prevent="assignVm" novalidate>
                                    <div class="row">
                                        <div class="col-md-3 mb-3">
                                            <label class="form-label">虚拟机</label>
                                            <select class="form-select" v-model="assignForm.vm_id" required>
                                                <option value="">请选择</option>
                                                <option v-for="vm in availableVms" :key="vm.vmid" :value="vm.vmid">
                                                    {{ vm.name || 'VM ' + vm.vmid }} ({{ vm.vmid }})
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-md-2 mb-3">
                                            <label class="form-label">用户</label>
                                            <select class="form-select" v-model="assignForm.user_id" required>
                                                <option value="">请选择</option>
                                                <option v-for="u in users" :key="u.id" :value="u.id">{{ u.username }}</option>
                                            </select>
                                        </div>
                                        <div class="col-md-3 mb-3">
                                            <label class="form-label">名称</label>
                                            <input type="text" class="form-control" v-model="assignForm.name">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">到期时间</label>
                                            <input type="datetime-local" class="form-control" v-model="assignForm.expiration_date" step="1" onfocus="this.showPicker?.()">
                                        </div>
                                        <div class="col-md-2 mb-3">
                                            <label class="form-label">续费价格（可选）</label>
                                            <input type="text" class="form-control" v-model="assignForm.renewal_price" placeholder="如: ¥50/月">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary" formnovalidate>分配</button>
                                </form>
                            </div>
                        </div>

                        <div v-show="availableVms.length === 0 && assignedVms.length === 0" class="text-muted text-center py-4">
                            没有找到虚拟机，请确认 PVE 服务已启动
                        </div>

                        <div v-show="availableVms.length > 0">
                            <h5>待分配的虚拟机:</h5>
                            <div class="card mb-4">
                                <div class="table-responsive">
                                    <table class="table table-striped mb-0">
                                        <thead>
                                            <tr>
                                                <th>VM ID</th>
                                                <th>名称</th>
                                                <th>状态</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr v-for="vm in availableVms" :key="vm.vmid">
                                                <td>{{ vm.vmid }}</td>
                                                <td>{{ vm.name || '-' }}</td>
                                                <td>
                                                    <span :class="vm.status === 'running' ? 'status-running' : 'status-stopped'">
                                                        {{ vm.status === 'running' ? '运行中' : '已停止' }}
                                                    </span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div v-show="assignedVms.length > 0">
                            <h5>已分配的虚拟机:</h5>
                            <div class="card">
                                <div class="table-responsive">
                                    <table class="table table-striped mb-0">
                                        <thead>
                                            <tr>
                                                <th>VM ID</th>
                                                <th>名称</th>
                                                <th>分配给</th>
                                                <th>状态</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr v-for="vm in assignedVms" :key="vm.vmid">
                                                <td>{{ vm.vmid }}</td>
                                                <td>{{ vm.name || '-' }}</td>
                                                <td>{{ vm.assigned_user || '-' }}</td>
                                                <td>
                                                    <span :class="vm.status === 'running' ? 'status-running' : 'status-stopped'">
                                                        {{ vm.status === 'running' ? '运行中' : '已停止' }}
                                                    </span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                    <!-- VM 端口转发 -->
                    <div v-if="activeTabVm === 'network'">
                        <vm-port-forward-list></vm-port-forward-list>
                    </div>
                </div>

                <!-- LXC 容器管理区域 -->
                <div v-if="activeSection === 'lxc'" class="lxc-section">
                    <div class="mb-3">
                        <ul class="nav nav-tabs">
                            <li class="nav-item">
                                <button class="nav-link" :class="{ active: activeTabLxc === 'create' }" @click="activeTabLxc = 'create'">新建 LXC 容器</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" :class="{ active: activeTabLxc === 'assign' }" @click="activeTabLxc = 'assign'">分配 LXC 容器</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" :class="{ active: activeTabLxc === 'manage' }" @click="activeTabLxc = 'manage'">容器管理</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" :class="{ active: activeTabLxc === 'network' }" @click="activeTabLxc = 'network'">网络</button>
                            </li>
                        </ul>
                    </div>

                    <!-- Tab 1: 新建 LXC 容器 -->
                    <div v-if="activeTabLxc === 'create'">
                        <div class="card">
                            <div class="card-header"><h5 class="mb-0">新建 LXC 容器</h5></div>
                            <div class="card-body">
                                <form @submit.prevent="createLxc" novalidate>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">模板</label>
                                            <select class="form-select" v-model="lxcForm.ostemplate" required>
                                                <option value="">请选择模板</option>
                                                <option v-for="tpl in lxcTemplates" :key="tpl.volid" :value="tpl.volid">{{ lxcTemplateLabel(tpl) }}</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">存储位置</label>
                                            <select class="form-select" v-model="lxcForm.storage">
                                                <option value="">默认</option>
                                                <option v-for="s in lxcStorageList" :key="s.id" :value="s.id">{{ s.id }} ({{ s.type }})</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">主机名</label>
                                            <input type="text" class="form-control" v-model="lxcForm.hostname" placeholder="例如: my-container" required>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">CPU 核心数</label>
                                            <input type="number" class="form-control" v-model.number="lxcForm.cores" min="1" max="64">
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label">磁盘 (GB)</label>
                                            <input type="number" class="form-control" v-model.number="lxcForm.disk" min="1" max="1000">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label class="form-label">内存 (MB)</label>
                                            <input type="number" class="form-control" v-model.number="lxcForm.memory" min="64" max="1048576">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Swap (MB)</label>
                                            <input type="number" class="form-control" v-model.number="lxcForm.swap" min="0" max="1048576">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Root 密码</label>
                                            <input type="password" class="form-control" v-model="lxcForm.password" autocomplete="new-password">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">确认密码</label>
                                            <input type="password" class="form-control" v-model="lxcForm.confirmPassword" autocomplete="new-password">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label class="form-label">网络桥接</label>
                                            <select class="form-select" v-model="lxcForm.net0Bridge">
                                                <option value="vmbr0">vmbr0</option>
                                                <option value="vmbr1">vmbr1</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">IPv4（留空=DHCP）</label>
                                            <input type="text" class="form-control" v-model="lxcForm.net0Ip" placeholder="如: 192.168.1.100/24">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">MAC（留空=自动）</label>
                                            <input type="text" class="form-control" v-model="lxcForm.net0Mac" placeholder="自动生成">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-12">
                                            <small class="text-muted">IPv6: 自动 DHCP 分配</small>
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="lxcUnprivileged" v-model="lxcForm.unprivileged">
                                                <label class="form-check-label" for="lxcUnprivileged">非特权容器（推荐）</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" id="lxcStart" v-model="lxcForm.start">
                                                <label class="form-check-label" for="lxcStart">创建后自动启动</label>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary">创建容器</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Tab 2: 分配 LXC 容器 -->
                    <div v-if="activeTabLxc === 'assign'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4>分配 LXC 容器</h4>
                            <button class="btn btn-warning btn-sm" @click="checkExpired">
                                立即检查过期容器
                            </button>
                        </div>
                        <div class="card mb-4">
                            <div class="card-body">
                                <form @submit.prevent="assignLxc" novalidate>
                                    <div class="row">
                                        <div class="col-md-3 mb-3">
                                            <label class="form-label">容器</label>
                                            <select class="form-select" v-model="lxcAssignForm.ct_id" required>
                                                <option value="">请选择</option>
                                                <option v-for="ct in lxcContainers" :key="ct.vmid" :value="ct.vmid">
                                                    {{ ct.name || 'CT ' + ct.vmid }} ({{ ct.vmid }})
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-md-2 mb-3">
                                            <label class="form-label">用户</label>

                                    <th>同步状态</th>\
                                    <th>操作</th>\
                                </tr>\
                            </thead>\
                            <tbody>\
                                <tr v-for="(rule, idx) in paginatedLxcForwardRules" :key="rule.id" :class="{ \'text-muted text-decoration-line-through\': rule.sync_status === \'orphan\' }">\
                                    <td v-if="userRole === \'admin\'"><input type="checkbox" :value="rule.id" v-model="selectedForwardIds"></td>\
                                    <td>{{ (forwardLxcPage - 1) * forwardPageSize + idx + 1 }}</td>\
                                    <td>{{ rule.name || \'-\' }}</td>\
                                    <td>{{ rule.ip }}</td>\
                                    <td>{{ rule.internal_port }}</td>\
                                    <td>{{ rule.external_port }}</td>\
                                    <td>{{ rule.protocol?.toUpperCase() }}</td>\
                                    <td><span :class="rule.enabled ? \'text-success\' : \'text-muted\'">{{ rule.enabled ? \'启用\' : \'禁用\' }}</span></td>\
                                    <td>\
                                        <span v-if="rule.sync_status === \'synced\'" class="badge bg-success">已同步</span>\
                                        <span v-else-if="rule.sync_status === \'orphan\'" class="badge bg-secondary">孤立</span>\
                                        <span v-else-if="rule.sync_status === \'failed\'" class="badge bg-danger">失败</span>\
                                        <span v-else class="badge bg-warning text-dark">待同步</span>\
                                    </td>\
                                    <td>\
                                        <button class="btn btn-sm btn-outline-primary me-1" @click="editForward(rule)">编辑</button>\
                                        <button class="btn btn-sm btn-outline-danger" @click="deleteForward(rule.id)">删除</button>\
                                    </td>\
                                </tr>\
                            </tbody>\
                        </table>\
                    </div>\
                    <nav v-if="lxcForwardTotal > forwardPageSize" class="mt-2">\
                        <ul class="pagination pagination-sm justify-content-center mb-0">\
                            <li class="page-item" :class="{ disabled: forwardLxcPage <= 1 }">\
                                <button class="page-link" @click="prevLxcPage">上一页</button>\
                            </li>\
                            <li class="page-item disabled">\
                                <span class="page-link">{{ forwardLxcPage }} / {{ Math.ceil(lxcForwardTotal / forwardPageSize) }}</span>\
                            </li>\
                            <li class="page-item" :class="{ disabled: forwardLxcPage >= Math.ceil(lxcForwardTotal / forwardPageSize) }">\
                                <button class="page-link" @click="nextLxcPage">下一页</button>\
                            </li>\
                        </ul>\
                    </nav>\
                    <div class="text-muted small" v-if="userRole !== \'admin\'">\
                        已使用 {{ userForwardCount }} / {{ maxForwardPerUser }} 条\
                    </div>\
                </div>\
            ',
            computed: {
                 userRole() { return $.user.value ? $.user.value.role : 'user'; },
                 userForwardCount() { return $.userForwardCount.value || 0; },
                 maxForwardPerUser() { return $.maxForwardPerUser.value || 10; },
                 selectedForwardIds: {
                     get() { return $.selectedForwardIds.value || []; },
                     set(val) { $.selectedForwardIds.value = val; }
                 },
                 forwardRulesLoading() { return $.forwardRulesLoading.value; },
                 forwardRules() { return $.forwardRules.value; },
                 paginatedLxcForwardRules() { return $.paginatedLxcForwardRules.value; },
                 forwardLxcPage() { return $.forwardLxcPage.value; },
                 forwardPageSize() { return $.forwardPageSize; },
                 lxcForwardTotal() { return $.lxcForwardTotal.value; }
             },
             methods: {
                  openAddForward() { $.openAddForward('lxc'); },
                  batchDelete() { $.batchDeleteForwards(); },
                  toggleAll(e) { $.toggleSelectAllForwards(e); },
                  prevLxcPage() { if ($.forwardLxcPage.value > 1) $.forwardLxcPage.value--; },
                  nextLxcPage() { $.forwardLxcPage.value++; },
                  editForward(rule) {
                      $.isEditingForward.value = true;
                      Object.assign($.forwardForm, {
                          id: rule.id, type: rule.type,
                          vm_id: rule.vm_id, ct_id: rule.ct_id,
                          name: rule.name, ip: rule.ip,
                          internal_port: rule.internal_port,
                          external_port: rule.external_port,
                          protocol: rule.protocol
                      });
                      $.showForwardModal.value = true;
                  },
                  deleteForward(id) { $.deleteForward(id); }
              }
          });

          app.mount('#app');
    </script>
    <script>fetch("/api/version").then(function(r){return r.json()}).then(function(d){var el=document.getElementById("appVersion");if(el)el.textContent="v"+d.version})</script>
</body>
</html>
