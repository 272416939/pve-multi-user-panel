<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <script src="js/theme-init.js"></script>
    <script src="js/app-version.js" defer></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css?v=2" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/lib/dompurify.min.js"></script>

</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<main class="main-wrap" id="mainContent">
<template id="appTemplate">

        <!-- Fixed Header -->
        <header class="page-header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="菜单"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                <span class="brand-logo">PVE 管理面板</span>
            </div>
            <div class="header-right">
                <button class="header-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
                    <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <a href="user-center.html#messages" class="header-btn" title="消息">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  <span class="notification-badge" id="adminMsgCount" style="display:none;">0</span>
</a>
                <div class="user-info-dropdown" id="userInfoDrop">
                    <img class="header-user-avatar" id="headerAvatar" alt="" />
                    <span class="header-username">Admin</span>
                    <ul class="header-user-menu" id="headerUserMenu">
                        <li><a href="user-center.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> 用户中心</a></li>
                        <li><hr class="header-menu-divider"></li>
                        <li><a href="#" onclick="window.__admin.logout();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 退出登录</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Fixed Sidebar (Vue 指令生效) -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a class="nav-item" :class="{ active: activeSection === 'overview' }" href="#" @click.prevent="switchSection('overview')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-text">总览</span></a>
                <a class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('vms');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                    <span class="nav-text">虚拟机管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div class="nav-submenu" id="submenu-vms">
                    <a class="nav-item" data-subsection="vms-manage" onclick="window.__admin.switchSubsection('vms','manage');return false;"><span class="nav-text">虚拟机列表</span></a>
                    <a class="nav-item" data-subsection="vms-assign" onclick="window.__admin.switchSubsection('vms','assign');return false;"><span class="nav-text">分配虚拟机</span></a>
                    <a class="nav-item" data-subsection="vms-network" onclick="window.__admin.switchSubsection('vms','network');return false;"><span class="nav-text">VM 端口转发管理</span></a>
                </div>
                <a class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('lxc');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                    <span class="nav-text">LXC 容器管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div class="nav-submenu" id="submenu-lxc">
                    <a class="nav-item" data-subsection="lxc-create" onclick="window.__admin.switchSubsection('lxc','create');return false;"><span class="nav-text">新建 LXC 容器</span></a>
                    <a class="nav-item" data-subsection="lxc-assign" onclick="window.__admin.switchSubsection('lxc','assign');return false;"><span class="nav-text">分配 LXC 容器</span></a>
                    <a class="nav-item" data-subsection="lxc-manage" onclick="window.__admin.switchSubsection('lxc','manage');return false;"><span class="nav-text">容器管理</span></a>
                    <a class="nav-item" data-subsection="lxc-network" onclick="window.__admin.switchSubsection('lxc','network');return false;"><span class="nav-text">CT 端口转发管理</span></a>
                </div>
                <!-- 后台管理 -->
                <a class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('manage');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                    <span class="nav-text">后台管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div class="nav-submenu" id="submenu-manage">
                    <a class="nav-item" data-subsection="manage-users" onclick="window.__admin.switchAdminTab('users');return false;"><span class="nav-text">用户管理</span></a>
                    <a class="nav-item" data-subsection="manage-cdk" onclick="window.__admin.switchAdminTab('cdk');return false;"><span class="nav-text">CDK 管理</span></a>
                    <a class="nav-item" data-subsection="manage-messages" onclick="window.__admin.switchAdminTab('messages');return false;"><span class="nav-text">消息管理</span></a>
                </div>

                <!-- 模板管理（父菜单，仅admin） -->
                <a v-if="user && user.role === 'admin'" class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('templates');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></span>
                    <span class="nav-text">模板管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div v-if="user && user.role === 'admin'" class="nav-submenu" id="submenu-templates">
                    <a class="nav-item" data-subsection="templates-vm" onclick="window.__admin.switchPage('vm-templates');return false;"><span class="nav-text">VM 模板</span></a>
                    <a class="nav-item" data-subsection="templates-lxc" onclick="window.__admin.switchPage('lxc-templates');return false;"><span class="nav-text">LXC 模板</span></a>
                </div>

                <!-- 套餐管理（父菜单，仅admin） -->
                <a v-if="user && user.role === 'admin'" class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('packages');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
                    <span class="nav-text">套餐管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div v-if="user && user.role === 'admin'" class="nav-submenu" id="submenu-packages">
                    <a class="nav-item" data-subsection="packages-vm" onclick="window.__admin.switchPage('vm-packages');return false;"><span class="nav-text">VM 套餐</span></a>
                    <a class="nav-item" data-subsection="packages-lxc" onclick="window.__admin.switchPage('lxc-packages');return false;"><span class="nav-text">LXC 套餐</span></a>
                </div>

                <!-- 财务管理（父菜单，仅admin） -->
                <a v-if="user && user.role === 'admin'" class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('finance');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg></span>
                    <span class="nav-text">财务管理</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div v-if="user && user.role === 'admin'" class="nav-submenu" id="submenu-finance">
                    <a class="nav-item" data-subsection="finance-transactions" onclick="window.__admin.switchSection('finance',{highlight:'finance-transactions'});window.__admin.activeTab.value='transactions';return false;"><span class="nav-text">交易流水</span></a>
                    <a class="nav-item" data-subsection="finance-orders" onclick="window.__admin.switchSection('finance',{highlight:'finance-orders'});window.__admin.activeTab.value='orders';return false;"><span class="nav-text">订单管理</span></a>
                </div>

                <!-- 系统设置 -->
                <a class="nav-item has-children" href="#" onclick="window.__admin.toggleSubmenu('settings');return false;">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg></span>
                    <span class="nav-text">系统设置</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
                </a>
                <div class="nav-submenu" id="submenu-settings">
                    <a class="nav-item" data-subsection="settings-smtp" onclick="window.__admin.switchAdminTab('smtp');return false;"><span class="nav-text">SMTP 配置</span></a>
                    <a class="nav-item" data-subsection="settings-snapshot-backup" onclick="window.__admin.switchAdminTab('snapshot-backup');return false;"><span class="nav-text">快照&备份配置</span></a>
                    <a class="nav-item" data-subsection="settings-network" onclick="window.__admin.switchAdminTab('network');return false;"><span class="nav-text">网络管理</span></a>
                    <a class="nav-item" data-subsection="settings-pay" onclick="window.__admin.switchAdminTab('pay');return false;"><span class="nav-text">支付配置</span></a>
                </div>

                <!-- 系统更新（独立一级菜单） -->
                <a class="nav-item" :class="{ active: activeSection === 'system-update' }" href="#" @click.prevent="switchSection('system-update')">
                    <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span>
                    <span class="nav-text">系统更新</span>
                </a>
            </nav>
        </aside>

        <div>
            <div v-if="!user" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2 text-muted">正在验证登录状态...</p>
            </div>

            <div v-else>
                <!-- 总览区域 -->
                <div v-if="activeSection === 'overview'">
                    <h4 class="module-title">资源运行概况</h4>
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6 col-md-3">
                            <div class="stat-card">
                                <div class="stat-card-head">
                                    <span class="stat-icon stat-icon-run"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                                    <span class="stat-label">虚拟机运行中</span>
                                </div>
                                <div class="stat-num">{{ userVms.filter(v => v.status && v.status.status === 'running').length }}</div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-md-3">
                            <div class="stat-card">
                                <div class="stat-card-head">
                                    <span class="stat-icon stat-icon-stop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                                    <span class="stat-label">虚拟机已停止</span>
                                </div>
                                <div class="stat-num">{{ userVms.filter(v => !v.status || v.status.status !== 'running').length }}</div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-md-3">
                            <div class="stat-card">
                                <div class="stat-card-head">
                                    <span class="stat-icon stat-icon-run"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                                    <span class="stat-label">容器运行中</span>
                                </div>
                                <div class="stat-num">{{ userLxcContainers.filter(c => c.status && c.status.status === 'running').length }}</div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-md-3">
                            <div class="stat-card">
                                <div class="stat-card-head">
                                    <span class="stat-icon stat-icon-stop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                                    <span class="stat-label">容器已停止</span>
                                </div>
                                <div class="stat-num">{{ userLxcContainers.filter(c => !c.status || c.status.status !== 'running').length }}</div>
                            </div>
                        </div>
                    </div>

                    <h4 class="module-title">资源分布</h4>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="overview-chart-card">
                                <div class="circle-wrap">
                                    <svg width="160" height="160" viewBox="-7 -7 144 144">
                                        <circle class="circle-bg" cx="65" cy="65" r="60"></circle>
                                        <circle class="circle-progress" :style="{ strokeDashoffset: circleVmOffset }" cx="65" cy="65" r="60"></circle>
                                    </svg>
                                    <div class="circle-text">
                                        <div class="circle-num">{{ userVms.length }}</div>
                                        <div class="circle-name">虚拟机</div>
                                    </div>
                                </div>
                                <div class="chart-legend">
                                    <span class="legend-item"><span class="legend-dot dot-run"></span> 运行 {{ userVms.filter(v => v.status && v.status.status === 'running').length }}</span>
                                    <span class="legend-item"><span class="legend-dot dot-stop"></span> 停止 {{ userVms.filter(v => !v.status || v.status.status !== 'running').length }}</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="overview-chart-card">
                                <div class="circle-wrap">
                                    <svg width="160" height="160" viewBox="-7 -7 144 144">
                                        <circle class="circle-bg" cx="65" cy="65" r="60"></circle>
                                        <circle class="circle-progress" :style="{ strokeDashoffset: circleCtOffset, stroke: userLxcContainers.length > 0 ? '#36D399' : '#6B7280' }" cx="65" cy="65" r="60"></circle>
                                    </svg>
                                    <div class="circle-text">
                                        <div class="circle-num">{{ userLxcContainers.length }}</div>
                                        <div class="circle-name">容器</div>
                                    </div>
                                </div>
                                <div class="chart-legend">
                                    <span class="legend-item"><span class="legend-dot dot-run"></span> 运行 {{ userLxcContainers.filter(c => c.status && c.status.status === 'running').length }}</span>
                                    <span class="legend-item"><span class="legend-dot dot-stop"></span> 停止 {{ userLxcContainers.filter(c => !c.status || c.status.status !== 'running').length }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 虚拟机管理区域 -->
                <div v-if="activeSection === 'vms'">
                    <div v-if="activeTabVm === 'manage'">
                        <div class="module-header">
                            <h4 class="module-title">虚拟机列表</h4>
                            <button class="btn-glass" @click="openCdkRedeem">CDK 兑换</button>
                        </div>
                    <div v-if="vmsLoading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2 text-muted">加载中...</p>
                    </div>
                    <div v-else class="vm-table-wrap">
                        <div class="table-container">
                            <div class="table-scroll">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>VMID</th>
                                            <th>用户</th>
                                            <th>主机名称</th>
                                            <th>默认账号</th>
                                            <th>内网IP</th>
                                            <th>CNAME域名</th>
                                            <th>配置</th>
                                            <th>续费价格</th>
                                            <th>系统</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr v-for="vm in userVms" :key="vm.id">
                                            <td>{{ vm.vm_id }}</td>
                                            <td>{{ vm.username || '-' }}</td>
                                            <td>{{ vm.name || ('VM ' + vm.vm_id) }}</td>
                                            <td>{{ vm.config?.ciuser || '未安装Cloud-init驱动' }}</td>
                                            <td>{{ vm.ip || vm.dhcp_static_ip || '-' }}</td>
                                            <td><span v-if="networkConfig.cname_domain" class="text-primary">{{ vm.vm_id }}.{{ networkConfig.cname_domain }}</span><span v-else class="text-muted">-</span></td>

                                <template v-if="showDeviceForm">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h6 class="mb-0">{{ editingDeviceRuleId ? '编辑端口转发' : '添加端口转发' }}</h6>
                                        <button class="btn btn-sm btn-outline-light" @click="cancelDeviceForm">返回</button>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">规则名称</label>
                                        <input type="text" class="form-control bg-dark text-light border-secondary" v-model="deviceForm.name" placeholder="如 SSH 转发">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">目标 IP</label>
                                        <input type="text" class="form-control bg-dark text-light border-secondary" :value="deviceModal.device.ip || ''" readonly>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-light">协议</label>
                                        <select class="form-select bg-dark text-light border-secondary" v-model="deviceForm.protocol">
                                            <option value="tcp">TCP</option>
                                            <option value="udp">UDP</option>
                                            <option value="tcp+udp">TCP+UDP</option>
                                        </select>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label text-light">内网端口</label>
                                            <input type="number" class="form-control bg-dark text-light border-secondary" v-model.number="deviceForm.internal_port" min="1" max="65535">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label text-light">外网端口</label>
                                            <div class="input-group">
                                                <input type="number" class="form-control bg-dark text-light border-secondary" :class="{ 'is-invalid': deviceCheckResult === false }" v-model.number="deviceForm.external_port" min="1" max="65535">
                                                <button class="btn btn-outline-secondary" type="button" @click="randomDevicePort" title="随机端口">🎲</button>
                                            </div>
                                            <small class="text-muted">可用范围: {{ networkConfig.port_range_start }}-{{ networkConfig.port_range_end }}</small>
                                            <div v-if="deviceCheckResult === true" class="text-success small mt-1">✅ 端口可用</div>
                                            <div v-else-if="deviceCheckResult === false" class="text-danger small mt-1">❌ 端口已被占用</div>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-primary" @click="submitDeviceRule" :disabled="!deviceForm.internal_port || !deviceForm.external_port || deviceCheckResult === false">{{ editingDeviceRuleId ? '保存修改' : '提交' }}</button>
                                        <button class="btn btn-secondary" @click="cancelDeviceForm">取消</button>
                                    </div>
                                </template>

                            </div>
                        </div>
                    </div>
                </div>
                </Teleport>

                <!-- VM 套餐编辑弹窗 -->
                <Teleport to="body">
                <div class="modal fade" id="vmPackageModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">{{ packagePage.vmPackageForm.value.id ? '编辑 VM 套餐' : '新建 VM 套餐' }}</h5>
                                <button type="button" class="btn-close" @click="bsModalHide('vmPackageModal')"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">套餐名称</label><input class="form-control" v-model="packagePage.vmPackageForm.value.name"></div>
                                    <div class="col-md-6"><label class="form-label">关联模板</label><select class="form-select" v-model="packagePage.vmPackageForm.value.template_id">
                                        <option value="">请选择</option>
                                        <option v-for="t in packagePage.vmTemplateOptions.value" :key="t.id" :value="t.id">{{ t.name }}</option>
                                    </select></div>
                                    <div class="col-md-4"><label class="form-label">CPU (核)</label><input class="form-control" type="number" v-model="packagePage.vmPackageForm.value.cores"></div>
                                    <div class="col-md-4"><label class="form-label">内存 (MB)</label><input class="form-control" type="number" v-model="packagePage.vmPackageForm.value.memory"></div>
                                    <div class="col-md-4"><label class="form-label">磁盘 (GB)</label><input class="form-control" type="number" v-model="packagePage.vmPackageForm.value.disk_size"></div>
                                    <div class="col-md-4"><label class="form-label">CPU 型号</label><input class="form-control" v-model="packagePage.vmPackageForm.value.cpu_model" placeholder="如: Intel Xeon Platinum"></div>
                                    <div class="col-md-4"><label class="form-label">带宽 (Mbps)</label><input type="number" class="form-control" v-model.number="packagePage.vmPackageForm.value.bandwidth" min="0" step="1"></div>
                                    <div class="col-md-4"><label class="form-label">月付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.vmPackageForm.value.monthly_price"></div>
                                    <div class="col-md-4"><label class="form-label">季付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.vmPackageForm.value.quarterly_price"></div>
                                    <div class="col-md-4"><label class="form-label">年付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.vmPackageForm.value.yearly_price"></div>
                                    <div class="col-md-4">
                                        <label class="form-label">销售库存（留空=不限）</label>
                                        <input type="number" class="form-control" v-model.number="packagePage.vmPackageForm.value.stock" min="0" step="1" placeholder="留空不限制">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">已销售</label>
                                        <input type="text" class="form-control" :value="packagePage.vmPackageForm.value.sold_count || 0" disabled readonly>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">排序（数字越小越前）</label>
                                        <input type="number" class="form-control" v-model.number="packagePage.vmPackageForm.value.sort_order" step="1">
                                    </div>
                    <div class="col-md-6"><label class="form-label">状态</label><select class="form-select" v-model="packagePage.vmPackageForm.value.status"><option value="active">启用</option><option value="inactive">停用</option></select></div>
                                    <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" rows="2" v-model="packagePage.vmPackageForm.value.description"></textarea></div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" @click="bsModalHide('vmPackageModal')">取消</button>
                                <button class="btn btn-primary" @click="packagePage.saveVmPackage()">保存</button>
                            </div>
                        </div>
                    </div>
                </div>
                </Teleport>

                <!-- LXC 套餐编辑弹窗 -->
                <Teleport to="body">
                <div class="modal fade" id="lxcPackageModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">{{ packagePage.lxcPackageForm.value.id ? '编辑 LXC 套餐' : '新建 LXC 套餐' }}</h5>
                                <button type="button" class="btn-close" @click="bsModalHide('lxcPackageModal')"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">套餐名称</label><input class="form-control" v-model="packagePage.lxcPackageForm.value.name"></div>
                                    <div class="col-md-6"><label class="form-label">关联模板</label><select class="form-select" v-model="packagePage.lxcPackageForm.value.template_id">
                                        <option value="">请选择</option>
                                        <option v-for="t in packagePage.lxcTemplateOptions.value" :key="t.id" :value="t.id">{{ t.name }}</option>
                                    </select></div>
                                    <div class="col-md-3"><label class="form-label">CPU (核)</label><input class="form-control" type="number" v-model="packagePage.lxcPackageForm.value.cores"></div>
                                    <div class="col-md-3"><label class="form-label">内存 (MB)</label><input class="form-control" type="number" v-model="packagePage.lxcPackageForm.value.memory"></div>
                                    <div class="col-md-3"><label class="form-label">Swap (MB)</label><input class="form-control" type="number" v-model="packagePage.lxcPackageForm.value.swap"></div>
                                    <div class="col-md-3"><label class="form-label">磁盘 (GB)</label><input class="form-control" type="number" v-model="packagePage.lxcPackageForm.value.disk_size"></div>
                                    <div class="col-md-3"><label class="form-label">CPU 型号</label><input class="form-control" v-model="packagePage.lxcPackageForm.value.cpu_model" placeholder="如: Intel Xeon Platinum"></div>
                                    <div class="col-md-3"><label class="form-label">带宽 (Mbps)</label><input type="number" class="form-control" v-model.number="packagePage.lxcPackageForm.value.bandwidth" min="0" step="1"></div>
                                    <div class="col-md-4"><label class="form-label">月付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.lxcPackageForm.value.monthly_price"></div>
                                    <div class="col-md-4"><label class="form-label">季付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.lxcPackageForm.value.quarterly_price"></div>
                                    <div class="col-md-4"><label class="form-label">年付价格</label><input class="form-control" type="number" step="0.01" v-model="packagePage.lxcPackageForm.value.yearly_price"></div>
                                    <div class="col-md-3">
                                        <label class="form-label">销售库存（留空=不限）</label>
                                        <input type="number" class="form-control" v-model.number="packagePage.lxcPackageForm.value.stock" min="0" step="1" placeholder="留空不限制">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">已销售</label>
                                        <input type="text" class="form-control" :value="packagePage.lxcPackageForm.value.sold_count || 0" disabled readonly>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">排序（数字越小越前）</label>
                                        <input type="number" class="form-control" v-model.number="packagePage.lxcPackageForm.value.sort_order" step="1">
                                    </div>
                    <div class="col-md-6"><label class="form-label">状态</label><select class="form-select" v-model="packagePage.lxcPackageForm.value.status"><option value="active">启用</option><option value="inactive">停用</option></select></div>
                                    <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" rows="2" v-model="packagePage.lxcPackageForm.value.description"></textarea></div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" @click="bsModalHide('lxcPackageModal')">取消</button>
                                <button class="btn btn-primary" @click="packagePage.saveLxcPackage()">保存</button>
                            </div>
                        </div>
                    </div>
                </div>
                </Teleport>

                <!-- 页脚 -->
                <div class="text-center py-4 mt-4 text-muted small">
                    <div>PVE 管理面板 <span id="appVersion"></span></div>
                </div>
            </div>

            <!-- VM/LXC 操作确认弹窗 -->
            <Teleport to="body">
            <div class="vm-detail-modal" :class="{ show: confirmState?.vmId !== null || lxcConfirmState?.ctId !== null }" @click.self="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">
                <div class="modal-content" style="max-width:440px">
                    <div class="modal-header">
                        <h2 class="modal-title">操作确认</h2>
                        <button class="modal-close" @click="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">✕</button>
                    </div>
                    <div class="modal-body" style="padding:24px 28px;text-align:center">
                        <p style="font-size:15px;color:var(--text-primary);line-height:1.6;margin:0 0 20px">{{ confirmState?.vmId !== null ? confirmActionText : confirmLxcActionText }}</p>
                        <div style="display:flex;gap:10px;justify-content:center">
                            <button class="table-btn btn-danger" style="padding:8px 28px;font-size:14px" @click="confirmState?.vmId !== null ? confirmAction(userVms.find(function(v){return v.id===confirmState.vmId})||userVms[0]) : confirmLxcAction(userLxcContainers.find(function(c){return c.ct_id===lxcConfirmState.ctId})||userLxcContainers[0])">确认执行</button>
                            <button class="table-btn" style="padding:8px 28px;font-size:14px" @click="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">取消</button>
                        </div>
                    </div>
                </div>
            </div>
            </Teleport>

            <!-- VM/CT 详情监控弹窗（Teleport到body，避免被main-wrap层叠上下文遮挡） -->
            <Teleport to="body">
            <div class="vm-detail-modal" :class="{ show: showVmDetail }" @click.self="closeVmDetail()">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">{{ detailVm._isLxc ? (detailVm.name || ('CT ' + detailVm.vm_id)) : (detailVm.name || ('VM ' + detailVm.vm_id)) }} 详情</h2>
                        <button class="modal-close" @click="closeVmDetail()">✕</button>
                    </div>
                    <div class="modal-body">
                <!-- 基本信息区域 -->
                <div class="info-card">
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">{{ detailVm._isLxc ? '容器ID' : '虚拟机ID' }}</span><span class="info-value">{{ detailVm.vm_id || '-' }}</span></div>
                        <div class="info-item"><span class="info-label">内网IP</span><span class="info-value">{{ detailVm.ip || '-' }}</span></div>
                        <div class="info-item"><span class="info-label">硬件配置</span><span class="info-value">{{ detailVmConfigStr }}</span></div>
                        <div class="info-item"><span class="info-label">续费价格</span><span class="info-value">{{ detailVm.renewal_price ? detailVm.renewal_price + '元/' + (detailVm.renewal_period === 'year' ? '年' : detailVm.renewal_period === 'quarter' ? '季' : '月') : '-' }}</span></div>
                        <div class="info-item"><span class="info-label">{{ detailVm._isLxc ? '镜像' : '操作系统' }}</span><span class="info-value">{{ detailVmOsStr }}</span></div>
                        <div class="info-item"><span class="info-label">运行状态</span><span class="info-value">{{ detailVmStatusStr }}</span></div>
                        <div class="info-item"><span class="info-label">运行时长</span><span class="info-value">{{ detailVmUptimeStr }}</span></div>
                    </div>
                </div>
                <!-- 监控图表区域 -->
                <h4 style="font-size:16px;color:var(--text-secondary);margin-bottom:16px;">实时性能监控</h4>
                <div class="chart-grid">
                    <div class="chart-card"><div class="chart-title">CPU 使用率 (%)</div><canvas id="detailCpuChart"></canvas></div>
                    <div class="chart-card"><div class="chart-title">内存使用率 (%)</div><canvas id="detailMemChart"></canvas></div>
                    <div class="chart-card"><div class="chart-title">网络流量 (Mbps)</div><canvas id="detailNetChart"></canvas></div>
                    <div class="chart-card"><div class="chart-title">磁盘IO (MB/s)</div><canvas id="detailDiskChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>
    </Teleport>
    </template>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.11/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="js/shared.js"></script>
    <script>window.__admin = {};</script>
    <!-- Admin 模块 -->
    <script src="js/admin/core.js?v=20260612"></script>
    <script src="js/admin/vm.js?v=20260612"></script>
    <script src="js/admin/lxc.js?v=20260612"></script>
    <script src="js/admin/admin.js?v=20260612"></script>
    <script src="js/admin/network.js?v=20260612"></script>
    <script src="js/admin/update.js?v=20260612"></script>
    <script src="js/admin/package.js?v=20260612"></script>
    <script src="js/admin/template.js?v=20260615"></script>
    <script src="js/admin/admin-page.js"></script>

</main>

</body>
</html>
