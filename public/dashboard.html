<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <style>.modal-backdrop{z-index:1050!important}.modal{z-index:1055!important}</style>
</head>
<body>
    <template id="appTemplate">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4">
            <div class="container">
                <a class="navbar-brand" :href="user && user.role === 'admin' ? 'admin.html?section=vms' : 'dashboard.html'">PVE 多用户控制面板</a>
                <ul class="navbar-nav me-auto">
                    <li class="nav-item" v-for="item in navItems" :key="item.id">
                        <a class="nav-link" :class="{ active: item.id === currentNavId }" :href="item.href">{{ item.label }}</a>
                    </li>
                </ul>
                <div class="navbar-nav ms-auto align-items-center">
                    <a v-if="user" class="btn btn-link text-white position-relative me-2 p-1" href="user-center.html#messages" aria-label="消息" title="消息" style="text-decoration:none;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span v-if="unreadCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:10px; min-width:16px;">
                            {{ unreadCount > 99 ? '99+' : unreadCount }}
                        </span>
                    </a>
                    <div class="dropdown" v-if="user">
                        <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <img v-if="user.avatar" :src="user.avatar" alt="" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover; margin-right: 5px;"/>
                            <img v-else :src="getGeekAvatar(user.username)" alt="" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover; margin-right: 5px;"/>
                            {{ user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="user-center.html">用户中心</a></li>
                            <li><hr class="dropdown-divider"/></li>
                            <li><a class="dropdown-item" href="#" @click.prevent="logout">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div v-if="!user" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2 text-muted">正在验证登录状态...</p>
            </div>

            <div v-else>
                <!-- VM Section -->
                <div v-show="activeSection === 'vm'">
                    <div v-if="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2 text-muted">加载中...</p>
                    </div>
                    <div v-else class="row g-3">
                        <div v-for="vm in userVms" :key="vm.id" class="col-md-6 d-flex">
                            <div class="card vm-card h-100 w-100" :class="{ expired: vm.isExpired, destroyed: vm.destroyed }">
                                <div class="card-body d-flex flex-column">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="card-title mb-0">{{ vm.name || 'VM ' + vm.vm_id }}</h5>
                                        <span v-if="vm.status" :class="vm.status.status === 'running' ? 'status-running' : 'status-stopped'">
                                            {{ vm.status.status === 'running' ? '运行中' : '已停止' }}
                                        </span>
                                    </div>
                                    <div class="text-muted small mb-2">
                                        <strong>VMID:</strong> {{ vm.vm_id }}
                                        <span v-if="vm.status && vm.status.status === 'running' && vm.status.uptime !== undefined" class="ms-3">
                                            <strong>运行时长:</strong> {{ formatUptime(vm.status.uptime) }}
                                        </span>
                                    </div>
                                    <div v-if="vm.config" class="mb-2">
                                        <div class="row">
                                            <div class="col-6">
                                                <small class="vm-label">CPU:</small> {{ vm.config.sockets || 1 }} x {{ vm.config.cores || 1 }} 核
                                            </div>
                                            <div class="col-6">
                                                <small class="vm-label">内存:</small> {{ formatMemory(vm.config.memory) }}
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="vm.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="vm.status.cpu !== undefined">
                                                <small class="vm-label">CPU 使用率:</small> {{ (vm.status.cpu * 100).toFixed(1) }}%
                                            </div>
                                            <div class="col-6" v-if="vm.status.mem !== undefined && vm.config">
                                                <small class="vm-label">内存使用率:</small> {{ ((vm.status.mem / (vm.config.memory * 1024 * 1024)) * 100).toFixed(1) }}%
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="vm.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="vm.status.netin !== undefined || vm.status.netout !== undefined">
                                                <small class="vm-label">网络流量:</small>
                                                <span v-if="vm.status.netin !== undefined">↓{{ formatBytes(vm.status.netin) }}/s 下载</span>
                                                <span v-if="vm.status.netin !== undefined && vm.status.netout !== undefined"> / </span>
                                                <span v-if="vm.status.netout !== undefined">↑{{ formatBytes(vm.status.netout) }}/s 上传</span>
                                            </div>
                                            <div class="col-6" v-if="vm.status.diskread !== undefined || vm.status.diskwrite !== undefined">
                                                <small class="vm-label">磁盘IO:</small>
                                                <span v-if="vm.status.diskread !== undefined">↓{{ formatBytes(vm.status.diskread) }}/s 读</span>
                                                <span v-if="vm.status.diskread !== undefined && vm.status.diskwrite !== undefined"> / </span>
                                                <span v-if="vm.status.diskwrite !== undefined">↑{{ formatBytes(vm.status.diskwrite) }}/s 写</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">到期时间:</small> {{ vm.expiration_date ? formatDate(vm.expiration_date) : '无限期' }}
                                        <span v-if="vm.isExpired" class="badge bg-warning ms-2">已过期</span>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">续费价格:</small> {{ vm.renewal_price || '暂无' }}
                                    </div>
                                    <div class="d-flex gap-2 mt-auto flex-wrap align-items-center">
                                        <!-- 电源控制 -->
                                        <div class="btn-group">
                                            <button class="btn btn-success btn-sm" @click="startVm(vm.vm_id)" :disabled="!vm.status || vm.status.status === 'running' || (vm.isExpired && (!user || user.role !== 'admin'))">启动</button>
                                            <button class="btn btn-warning btn-sm text-white" @click="requestConfirm(vm.id, 'shutdown')" :disabled="!vm.status || vm.status.status !== 'running'" title="安全关机">关机</button>
                                            <button class="btn btn-secondary btn-sm" @click="requestConfirm(vm.id, 'reboot')" :disabled="!vm.status || vm.status.status !== 'running'" title="重启">重启</button>
                                            <button class="btn btn-danger btn-sm" @click="requestConfirm(vm.id, 'stop')" :disabled="!vm.status || vm.status.status !== 'running'" title="强制停止">停止</button>
                                        </div>
                                        <!-- VNC -->
                                        <button class="btn btn-info btn-sm text-white" @click="openVncConsole(vm.vm_id)" :disabled="!vm.status || vm.status.status !== 'running'" title="打开 VNC 控制台">VNC</button>
                                        <!-- 网络 -->
                                        <button class="btn btn-outline-info btn-sm text-white" @click="openDeviceForward(vm, 'vm')" title="端口转发管理">网络</button>
                                        <!-- 管理 -->
                                        <div class="btn-group">
                                            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">管理</button>
                                            <ul class="dropdown-menu">
                                                <li><button class="dropdown-item" @click="openSnapshotPanel(vm)">快照</button></li>
                                                <li><button class="dropdown-item" @click="openBackupPanel(vm)">备份</button></li>
                                                <li><hr class="dropdown-divider"></li>
                                                <li><button class="dropdown-item" @click="editVm(vm)">编辑</button></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div v-if="vm.destroyed" class="destroyed-overlay">
                                    <div class="destroyed-overlay-content">
                                        <svg class="destroyed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="12" y1="8" x2="12" y2="12"/>
                                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                                        </svg>
                                        <div class="destroyed-title">该虚拟机已被销毁</div>
                                        <div class="destroyed-desc mb-3">请联系管理员处理</div>
                                        <button v-if="user && user.role === 'admin'" class="btn btn-danger btn-sm" @click="removeVmById(vm.id)">移除此分配</button>
                                    </div>
                                </div>
                                <div v-if="confirmState.vmId === vm.id" class="confirm-overlay">
                                    <div class="confirm-overlay-content">
                                        <svg class="confirm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                            <line x1="12" y1="9" x2="12" y2="13"/>
                                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                                        </svg>
                                        <div class="confirm-title">确认操作</div>
                                        <div class="confirm-desc mb-3">{{ confirmActionText }}</div>
                                        <div class="d-flex gap-2 justify-content-center">
                                            <button class="btn btn-danger btn-sm" @click="confirmAction(vm)">确认</button>
                                            <button class="btn btn-outline-light btn-sm" @click="cancelConfirm">取消</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-if="!loading && userVms.length === 0" class="text-muted text-center py-4">
                        暂无虚拟机
                    </div>
                </div>

                <!-- LXC Section -->
                <div v-show="activeSection === 'lxc'">
                    <div v-if="lxcLoading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2 text-muted">加载中...</p>
                    </div>
                    <div v-else class="row g-3">
                        <div v-for="ct in userLxcContainers" :key="ct.id" class="col-md-6 d-flex">
                            <div class="card vm-card h-100 w-100" :class="{ expired: ct.isExpired, destroyed: ct.destroyed }">
                                <div class="card-body d-flex flex-column">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="card-title mb-0">{{ ct.name || 'CT ' + ct.ct_id }}</h5>
                                        <div>
                                            <span v-if="ct.isExpired" class="badge bg-warning me-1">已到期</span>
                                            <span v-if="ct.status" :class="ct.status.status === 'running' ? 'status-running' : 'status-stopped'">
                                                {{ ct.status.status === 'running' ? '运行中' : '已停止' }}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="text-muted small mb-2">
                                        <strong>CTID:</strong> {{ ct.ct_id }}
                                        <span v-if="ct.status && ct.status.status === 'running' && ct.status.uptime !== undefined" class="ms-3">
                                            <strong>运行时长:</strong> {{ formatLxcUptime(ct.status.uptime) }}
                                        </span>
                                    </div>
                                    <div v-if="ct.config" class="mb-2">
                                        <div class="row">
                                            <div class="col-6">
                                                <small class="vm-label">CPU:</small> {{ ct.config.cores || 1 }} 核
                                            </div>
                                            <div class="col-6">
                                                <small class="vm-label">内存:</small> {{ formatMemory(ct.config.memory) }}
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="ct.config" class="mb-2">
                                        <div class="row">
                                            <div class="col-6">
                                                <small class="vm-label">磁盘:</small> {{ formatMemory(ct.config.disk) || '-' }}
                                            </div>
                                            <div class="col-6" v-if="ct.config.swap">
                                                <small class="vm-label">Swap:</small> {{ formatMemory(ct.config.swap) }}
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="ct.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="ct.status.cpu !== undefined">
                                                <small class="vm-label">CPU 使用率:</small> {{ getLxcCpuUsage(ct) }}%
                                            </div>
                                            <div class="col-6" v-if="ct.status.mem !== undefined && ct.config">
                                                <small class="vm-label">内存使用率:</small> {{ getLxcMemUsage(ct) }}%
                                            </div>
                                        </div>
                                    </div>
                                    <div v-if="ct.status" class="mb-2">
                                        <div class="row">
                                            <div class="col-6" v-if="ct.status.netin !== undefined || ct.status.netout !== undefined">
                                                <small class="vm-label">网络流量:</small>
                                                <span v-if="ct.status.netin !== undefined">↓{{ formatBytes(ct.status.netin) }}/s 下载</span>
                                                <span v-if="ct.status.netin !== undefined && ct.status.netout !== undefined"> / </span>
                                                <span v-if="ct.status.netout !== undefined">↑{{ formatBytes(ct.status.netout) }}/s 上传</span>
                                            </div>
                                            <div class="col-6" v-if="ct.status.diskread !== undefined || ct.status.diskwrite !== undefined">
                                                <small class="vm-label">磁盘IO:</small>
                                                <span v-if="ct.status.diskread !== undefined">↓{{ formatBytes(ct.status.diskread) }}/s 读</span>
                                                <span v-if="ct.status.diskread !== undefined && ct.status.diskwrite !== undefined"> / </span>
                                                <span v-if="ct.status.diskwrite !== undefined">↑{{ formatBytes(ct.status.diskwrite) }}/s 写</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">到期时间:</small> {{ ct.expiration_date ? formatDate(ct.expiration_date) : '无限期' }}
                                        <span v-if="ct.isExpired" class="badge bg-warning ms-2">已过期</span>
                                    </div>
                                    <div class="mb-2">
                                        <small class="vm-label">续费价格:</small> {{ ct.renewal_price || '暂无' }}
                                    </div>
                                    <div class="d-flex gap-2 mt-auto flex-wrap align-items-center">
                                        <!-- 电源控制 -->
                                        <div class="btn-group">
                                            <button class="btn btn-success btn-sm" @click="startLxc(ct.ct_id)" :disabled="!ct.status || ct.status.status === 'running' || (ct.isExpired && (!user || user.role !== 'admin'))">启动</button>
                                            <button class="btn btn-warning btn-sm text-white" @click="shutdownLxc(ct.ct_id)" :disabled="!ct.status || ct.status.status !== 'running'" title="安全关机">关机</button>
                                            <button class="btn btn-secondary btn-sm" @click="rebootLxc(ct.ct_id)" :disabled="!ct.status || ct.status.status !== 'running'" title="重启">重启</button>
                                            <button class="btn btn-danger btn-sm" @click="stopLxc(ct.ct_id)" :disabled="!ct.status || ct.status.status !== 'running'" title="强制停止">停止</button>
                                        </div>
                                        <!-- 终端 -->
                                        <button class="btn btn-success btn-sm text-white" @click="openLxcTerminal(ct.ct_id)" :disabled="!ct.status || ct.status.status !== 'running'" title="打开终端">终端</button>
                                        <!-- 网络 -->
                                        <button class="btn btn-outline-info btn-sm text-white" @click="openDeviceForward(ct, 'lxc')" title="端口转发管理">网络</button>
                                        <!-- 管理 -->
                                        <div class="btn-group">
                                            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">管理</button>
                                            <ul class="dropdown-menu">
                                                <li><button class="dropdown-item" @click="openLxcSnapshotPanel(ct)">快照</button></li>
                                                <li><button class="dropdown-item" @click="openLxcBackupPanel(ct)">备份</button></li>
                                                <li><button class="dropdown-item" @click="openLxcPasswordReset(ct)" :disabled="!ct.status || ct.status.status !== 'running'">重置密码</button></li>
                                                <li><button class="dropdown-item" @click="openResetLxcIpModal(ct)">重置 IP</button></li>
                                                <li><hr class="dropdown-divider"></li>
                                                <li><button class="dropdown-item" @click="editLxc(ct)">编辑</button></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div v-if="ct.destroyed" class="destroyed-overlay">
                                    <div class="destroyed-overlay-content">
                                        <svg class="destroyed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="12" y1="8" x2="12" y2="12"/>
                                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                                        </svg>
                                        <div class="destroyed-title">该LXC容器已被销毁</div>
                                        <div class="destroyed-desc mb-3">请联系管理员处理</div>
                                        <button v-if="user && user.role === 'admin'" class="btn btn-danger btn-sm" @click="removeLxcById(ct.id)">移除此分配</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-if="!lxcLoading && userLxcContainers.length === 0" class="text-muted text-center py-4">
                        暂无LXC容器
                    </div>
                </div>
            </div>
        </div>

        <Teleport to="body">

        <div class="modal fade" id="deviceForwardModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content" style="background:#1a1a2e;color:#e0e0e0;">
                    <div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,0.1);">
                        <h5 class="modal-title">{{ currentDevice.name || (currentDevice.type === 'vm' ? 'VM ' + currentDevice.deviceId : 'CT ' + currentDevice.deviceId) }} - 端口转发管理</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" style="min-height:150px;">

                        <!-- 规则列表 -->
                        <template v-if="!showDeviceForm">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div><span class="text-muted small">共 {{ deviceRules.length }} 条规则</span><span class="text-muted small ms-3">剩余可用 {{ forwardConfig.remaining }} 条</span></div>
                                <button class="btn btn-primary btn-sm" @click="openDeviceFormModal">添加端口转发</button>
                            </div>
                            <div v-if="deviceRules.length === 0" class="text-center py-4 text-muted">暂无端口转发规则</div>
                            <div v-else class="table-responsive mb-0">
                                <table class="table table-dark table-striped table-hover mb-0">
                                    <thead><tr>
                                        <th>名称</th><th>目标 IP</th><th>内网端口</th><th>外网端口</th><th>协议</th><th>状态</th><th>操作</th>
                                    </tr></thead>
                                    <tbody>
                                        <tr v-for="rule in deviceRules" :key="rule.id" :class="{ 'text-muted': rule.sync_status === 'orphan' }">
                                            <td>{{ rule.name || '-' }}</td>
                                            <td>{{ rule.ip }}</td>
                                            <td>{{ rule.internal_port }}</td>
                                            <td>{{ rule.external_port }}</td>
                                            <td>{{ (rule.protocol || '').toUpperCase() }}</td>
                                            <td><span :class="rule.enabled ? 'text-success' : 'text-muted'">{{ rule.enabled ? '启用' : '禁用' }}</span></td>
                                            <td>
                                                <button class="btn btn-sm btn-outline-light me-1" @click="openDeviceEditModal(rule)" title="编辑">编辑</button>
                                                <button class="btn btn-sm btn-outline-danger" @click="deleteDeviceRule(rule)" title="删除">删除</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                        <!-- 添加/编辑表单 -->
                        <template v-if="showDeviceForm">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="mb-0">{{ editingDeviceRuleId ? '编辑端口转发' : '添加端口转发' }}</h6>
                                <button class="btn btn-sm btn-outline-light" @click="cancelDeviceForm">返回</button>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">规则名称</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" v-model="deviceForm.name" placeholder="如 SSH 转发">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">目标 IP</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" :value="availableIps[0]?.ip || ''" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">协议</label>
                                <select class="form-select bg-dark text-light border-secondary" v-model="deviceForm.protocol">
                                    <option value="tcp">TCP</option>
                                    <option value="udp">UDP</option>
                                    <option value="tcp+udp">TCP+UDP</option>
                                </select>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">内网端口</label>
                                    <input type="number" class="form-control bg-dark text-light border-secondary" v-model.number="deviceForm.internal_port" min="1" max="65535">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">外网端口</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control bg-dark text-light border-secondary" :class="{ 'is-invalid': deviceCheckResult === false }" v-model.number="deviceForm.external_port" min="1" max="65535">
                                        <button class="btn btn-outline-secondary" type="button" @click="randomDevicePort" title="随机端口">🎲</button>
                                    </div>
                                    <small class="text-muted">可用范围: {{ forwardConfig.port_range_start }}-{{ forwardConfig.port_range_end }}</small>
                                    <div v-if="deviceCheckResult === true" class="text-success small mt-1">✅ 端口可用</div>
