<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <script src="js/theme-init.js"></script>
    <script src="js/app-version.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css?v=2" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
    
</head>
<body>

<!-- ===== 1. Page Header (Fixed Top 64px) ===== -->
<header class="page-header">
    <div class="header-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="brand-logo">PVE 面板</span>
    </div>
    <div class="header-right">
        <button class="header-btn" onclick="location.reload()" title="刷新"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg></button>
        <button class="header-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
            <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="user-center.html#messages" class="header-btn" title="消息" aria-label="消息">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-badge" id="msgCount" style="display:none;">0</span>
        </a>
        <div class="dropdown">
            <div class="user-info-dropdown" data-bs-toggle="dropdown">
                <img class="header-user-avatar" id="headerAvatar" alt="" />
                <span id="headerUsername">用户名</span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="user-center.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>用户中心</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:4px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录</a></li>
            </ul>
        </div>
    </div>
</header>

<!-- ===== 2. Sidebar (Fixed Left 220px) ===== -->
<aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
        <a class="nav-item active" data-section="overview" onclick="window.__dashboard.switchSection('overview');return false;"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-text">总览</span></a>
        <a class="nav-item" data-section="vm" onclick="window.__dashboard.switchSection('vm');return false;"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span><span class="nav-text">虚拟机</span></a>
        <a class="nav-item" data-section="lxc" onclick="window.__dashboard.switchSection('lxc');return false;"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span><span class="nav-text">容器</span></a>
        <!-- 套餐开通（父菜单） -->
        <a class="nav-item has-children" href="#" onclick="window.__dashboard.toggleSubmenu('order');return false;">
            <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
            <span class="nav-text">套餐开通</span>
            <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
        </a>
        <div class="nav-submenu" id="submenu-order">
            <a class="nav-item" data-subsection="order-vm" onclick="window.__dashboard.switchSubOrder('vm');return false;"><span class="nav-text">VM 虚拟机</span></a>
            <a class="nav-item" data-subsection="order-lxc" onclick="window.__dashboard.switchSubOrder('lxc');return false;"><span class="nav-text">LXC 容器</span></a>
        </div>
        <a id="dashboardAdminLink" href="admin.html" class="nav-item" style="display:none;">
            <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15l-5-5 5-5"/><path d="M19 10H7"/></svg></span>
            <span class="nav-text">管理后台</span>
        </a>
    </nav>
</aside>

<!-- ===== 3. Sidebar Overlay (Mobile Mask) ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ===== 4. Main Content ===== -->
<main class="main-wrap" id="mainContent">

<template id="appTemplate">

    <!-- 原来的 container 内容区域（移除了旧的 navbar） -->
    <div v-if="!user" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-2 text-muted">正在验证登录状态...</p>
    </div>

    <div v-else>
        <!-- Overview 总览 -->
        <div v-show="activeSection === 'overview'">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="module-title mb-0">资源运行概况</h4>
                <button class="btn-glass btn-glass-info" @click="openCdkRedeem">CDK 兑换</button>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-card-head">
                            <span class="stat-icon stat-icon-run"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                            <span class="stat-label">虚拟机运行中</span>
                        </div>
                        <div class="stat-num">{{ userVms.filter(v => v.status && v.status.status === 'running').length }}</div>
                    </div>
                </div>
                <div class="col-sm-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-card-head">
                            <span class="stat-icon stat-icon-stop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                            <span class="stat-label">虚拟机已停止</span>
                        </div>
                        <div class="stat-num">{{ userVms.filter(v => !v.status || v.status.status !== 'running').length }}</div>
                    </div>
                </div>
                <div class="col-sm-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-card-head">
                            <span class="stat-icon stat-icon-run"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                            <span class="stat-label">容器运行中</span>
                        </div>
                        <div class="stat-num">{{ userLxcContainers.filter(c => c.status && c.status.status === 'running').length }}</div>
                    </div>
                </div>
                <div class="col-sm-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-card-head">
                            <span class="stat-icon stat-icon-stop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                            <span class="stat-label">容器已停止</span>
                        </div>
                        <div class="stat-num">{{ userLxcContainers.filter(c => !c.status || c.status.status !== 'running').length }}</div>
                    </div>
                </div>
            </div>

            <h4 class="module-title">资源分布</h4>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="overview-chart-card">
                        <div class="circle-wrap">
                            <svg width="160" height="160" viewBox="-7 -7 144 144">
                                <circle class="circle-bg" cx="65" cy="65" r="60"></circle>
                                <circle class="circle-progress" :style="{ strokeDashoffset: circleVmOffset }" cx="65" cy="65" r="60"></circle>
                            </svg>
                            <div class="circle-text">
                                <div class="circle-num">{{ userVms.length }}</div>
                                <div class="circle-name">虚拟机</div>
                            </div>
                        </div>
                        <div class="chart-legend">
                            <span class="legend-item"><span class="legend-dot dot-run"></span> 运行 {{ userVms.filter(v => v.status && v.status.status === 'running').length }}</span>
                            <span class="legend-item"><span class="legend-dot dot-stop"></span> 停止 {{ userVms.filter(v => !v.status || v.status.status !== 'running').length }}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="overview-chart-card">
                        <div class="circle-wrap">
                            <svg width="160" height="160" viewBox="-7 -7 144 144">
                                <circle class="circle-bg" cx="65" cy="65" r="60"></circle>
                                <circle class="circle-progress" :style="{ strokeDashoffset: circleCtOffset, stroke: userLxcContainers.length > 0 ? '#36D399' : '#6B7280' }" cx="65" cy="65" r="60"></circle>
                            </svg>
                            <div class="circle-text">
                                <div class="circle-num">{{ userLxcContainers.length }}</div>
                                <div class="circle-name">容器</div>
                            </div>
                        </div>
                        <div class="chart-legend">
                            <span class="legend-item"><span class="legend-dot dot-run"></span> 运行 {{ userLxcContainers.filter(c => c.status && c.status.status === 'running').length }}</span>
                            <span class="legend-item"><span class="legend-dot dot-stop"></span> 停止 {{ userLxcContainers.filter(c => !c.status || c.status.status !== 'running').length }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VM Section -->
        <div v-show="activeSection === 'vm'">
            <h4 class="module-title">我的虚拟机</h4>
            <div v-if="loading" class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2 text-muted">加载中...</p>
            </div>
            <div v-else class="vm-table-wrap">
                <div class="table-container">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>主机名称</th>
                                    <th>默认账号</th>
                                    <th>内网IP</th>
                                    <th>CNAME域名</th>
                                    <th>配置</th>
                                    <th>续费价格</th>
                                    <th>系统</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="vm in userVms" :key="vm.id">
                                    <td>{{ vm.vm_id }}</td>
                                    <td>{{ vm.name || ('VM ' + vm.vm_id) }}</td>
                                    <td>{{ vm.config?.ciuser || '未安装Cloud-init驱动' }}</td>
                                    <td>{{ vm.ip || vm.dhcp_static_ip || '-' }}</td>
                                    <td><span v-if="cnameDomain" class="text-primary">{{ vm.vm_id }}.{{ cnameDomain }}</span><span v-else class="text-muted">-</span></td>
                                    <td>{{ (vm.config ? (vm.config.sockets||1) + '*' + (vm.config.cores||1) + '核 ' + formatMemory(vm.config.memory) : '-') }} {{ vm.status && vm.status.maxdisk ? '/ ' + Math.round(vm.status.maxdisk/1073741824*10)/10 + ' GB' : '' }}</td>
                                    <td>{{ vm.renewal_price ? vm.renewal_price + '元/' + (vm.renewal_period === 'year' ? '年' : '月') : '-' }}</td>
                                    <td>{{ vm.os || (vm.config ? (vm.config.ostype || '-') : '-') }}</td>
                                    <td><span :class="vm.status && vm.status.status === 'running' ? 'tag-run' : 'tag-stop'">{{ vm.status && vm.status.status === 'running' ? '运行中' : '已停止' }}</span></td>
                                    <td>
                                        <button class="table-btn btn-primary" @click="openVmDetail(vm)">详情</button>
                                        <div class="btn-group-table" v-if="vm.status && vm.status.status === 'running'">
                                            <button class="table-btn" @click="requestConfirm(vm.id, 'reboot')">重启</button>
                                            <button class="table-btn" @click="requestConfirm(vm.id, 'shutdown')">关机</button>
                                            <button class="table-btn btn-danger" @click="requestConfirm(vm.id, 'stop')">停止</button>
                                        </div>
                                        <div class="btn-group-table" v-if="!vm.status || vm.status.status !== 'running'">
                                            <button class="table-btn btn-primary" @click="startVm(vm.vm_id)">开机</button>
                                        </div>
                                        <div class="dropdown-table">
                                            <button class="table-btn dropdown-toggle" @click.stop="toggleDropdown('vm-'+vm.id, $event.currentTarget, [
                                                {label:'快照', action:function(){ openSnapshotPanel(vm) }},
                                                {label:'备份', action:function(){ openBackupPanel(vm) }},
                                                {label:'网络', action:function(){ openDeviceForward(vm, 'vm') }},
                                                {label:'控制台', action:function(){ openVncConsole(vm.vm_id) }},
                                                {label:'续费', action:function(){ renewResource = vm; renewShow = true; }},
                                                {label:'重置密码', action:function(){ openVmPasswordReset(vm) }},
                                                {label:'编辑', action:function(){ editVm(vm) }}
                                            ])">更多</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr v-if="userVms.length === 0">
                                    <td colspan="9" class="text-center text-muted py-4">暂无虚拟机</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- LXC Section -->
        <div v-show="activeSection === 'lxc'">
            <h4 class="module-title">我的容器</h4>
            <div v-if="lxcLoading" class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2 text-muted">加载中...</p>
            </div>
            <div v-else class="vm-table-wrap">
                <div class="table-container">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>容器名称</th>
                                    <th>内网IP</th>
                                    <th>CNAME域名</th>
                                    <th>配置</th>
                                    <th>续费价格</th>
                                    <th>镜像</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="ct in userLxcContainers" :key="ct.id">
                                    <td>{{ ct.ct_id }}</td>
                                    <td>{{ ct.name || ('CT ' + ct.ct_id) }}</td>
                                    <td>{{ ct.ip || ct.dhcp_static_ip || '-' }}</td>
                                    <td><span v-if="cnameDomain" class="text-primary">{{ ct.ct_id }}.{{ cnameDomain }}</span><span v-else class="text-muted">-</span></td>
                                    <td>{{ (ct.config ? (ct.config.cores || 1) + '核' + formatMemory(ct.config.memory) : '-') }} {{ ct.status && ct.status.maxdisk ? '/ ' + Math.round(ct.status.maxdisk/1073741824*10)/10 + ' GB' : '' }}</td>
                                    <td>{{ ct.renewal_price ? ct.renewal_price + '元/' + (ct.renewal_period === 'year' ? '年' : '月') : '-' }}</td>
                                    <td>{{ ct.template_name || (ct.config ? (ct.config.ostype || '-') : '-') }}</td>
                                    <td><span :class="ct.status && ct.status.status === 'running' ? 'tag-run' : 'tag-stop'">{{ ct.status && ct.status.status === 'running' ? '运行中' : '已停止' }}</span></td>
                                    <td>
                                        <button class="table-btn btn-primary" @click="openLxcDetail(ct)">详情</button>
                                        <div class="btn-group-table" v-if="ct.status && ct.status.status === 'running'">
                                            <button class="table-btn" @click="requestLxcConfirm(ct.ct_id, 'reboot')">重启</button>
                                            <button class="table-btn" @click="requestLxcConfirm(ct.ct_id, 'shutdown')">关机</button>
                                            <button class="table-btn btn-danger" @click="requestLxcConfirm(ct.ct_id, 'stop')">停止</button>
                                        </div>
                                        <div class="btn-group-table" v-if="!ct.status || ct.status.status !== 'running'">
                                            <button class="table-btn btn-primary" @click="startLxc(ct.ct_id)">启动</button>
                                        </div>
                                        <div class="dropdown-table">
                                            <button class="table-btn dropdown-toggle" @click.stop="toggleDropdown('lxc-'+ct.id, $event.currentTarget, [
                                                {label:'快照', action:function(){ openLxcSnapshotPanel(ct) }},
                                                {label:'备份', action:function(){ openLxcBackupPanel(ct) }},
                                                {label:'网络', action:function(){ openDeviceForward(ct, 'lxc') }},
                                                {label:'终端', action:function(){ openLxcTerminal(ct.ct_id) }},
                                                {label:'续费', action:function(){ renewResource = ct; renewShow = true; }},
                                                {label:'编辑', action:function(){ editLxc(ct) }},
                                                {label:'重置密码', action:function(){ openLxcPasswordReset(ct) }, cls:'text-warning'}
                                            ])">更多</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr v-if="userLxcContainers.length === 0">

                                </div>
                                <div class="col-4">
                                    <div class="border rounded p-2">
                                        <div class="small" style="color: var(--text-secondary); opacity: 0.75;">今日创建</div>
                                        <div class="fw-bold" :class="lxcSnapshotLimits.today_creates >= lxcSnapshotLimits.max_creates ? 'text-danger' : ''" style="color: var(--text-primary);">
                                            {{ lxcSnapshotLimits.today_creates }} / {{ lxcSnapshotLimits.max_creates }}
                                        </div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="border rounded p-2">
                                        <div class="small" style="color: var(--text-secondary); opacity: 0.75;">今日恢复</div>
                                        <div class="fw-bold" :class="lxcSnapshotLimits.today_rollbacks >= lxcSnapshotLimits.max_rollbacks ? 'text-danger' : ''" style="color: var(--text-primary);">
                                            {{ lxcSnapshotLimits.today_rollbacks }} / {{ lxcSnapshotLimits.max_rollbacks }}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- LXC Backup Modal -->
<div class="modal fade" id="lxcBackupModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">备份管理 - {{ lxcBackupCtName }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="card mb-3">
                    <div class="card-header"><h6 class="mb-0">创建备份</h6></div>
                    <div class="card-body">
                        <div class="mb-2">
                            <textarea class="form-control form-control-sm" v-model="lxcBackupForm.notes" rows="2" maxlength="50" placeholder="备注（可选）" style="resize:none"></textarea>
                             <small :style="'display:block;text-align:right;margin-top:2px;color:' + (lxcBackupForm.notes.length >= 50 ? '#ff4444' : 'var(--text-muted)')">{{ lxcBackupForm.notes.length || 0 }}/50</small>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">使用停止模式备份，压缩算法：zstd</small>
                            <button class="btn btn-primary btn-sm" @click="createLxcBackup()" :disabled="lxcBackupCreating">
                                <span v-if="lxcBackupCreating" class="spinner-border spinner-border-sm me-1"></span>
                                立即备份
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <input type="checkbox" class="form-check-input m-0" :checked="isAllLxcBackupsSelected" @change="toggleSelectAllLxcBackups" :disabled="lxcBackups.length === 0" style="cursor:pointer">
                            <h6 class="mb-0">备份历史</h6>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <button v-if="isAnyLxcBackupSelected" class="btn btn-danger btn-sm" @click="batchDeleteLxcBackups()" :disabled="lxcBackupDeleting">
                                <span v-if="lxcBackupDeleting" class="spinner-border spinner-border-sm me-1"></span>
                                批量删除 ({{ lxcBackupSelected.size }})
                            </button>
                            <span class="badge bg-secondary">{{ lxcBackups.length }} 个</span>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div v-if="lxcBackups.length === 0" class="text-center text-muted py-4 small">暂无备份</div>
                        <div v-else class="table-responsive" style="max-height:360px;overflow-y:auto;">
                            <table class="table table-striped mb-0 table-sm">
                                <thead style="position:sticky;top:0;">
                                    <tr>
                                        <th style="width:40px;"><input type="checkbox" class="form-check-input" :checked="isAllLxcBackupsSelected" @change="toggleSelectAllLxcBackups" :disabled="lxcBackups.length === 0" style="cursor:pointer"></th>
                                        <th style="width:40px;">#</th>
                                        <th>备份时间</th>
                                        <th>大小</th>
                                        <th>备注</th>
                                        <th style="width:100px;">状态</th>
                                        <th style="width:60px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(b, idx) in lxcBackups" :key="b.id" :style="lxcBackupSelected.has(b.id) ? 'background:rgba(99,102,241,0.08)' : ''">
                                                <td><input type="checkbox" class="form-check-input" :checked="lxcBackupSelected.has(b.id)" :disabled="b.status === 'running' || b.status === 'pending'" @change="toggleLxcBackupSelect(b.id)" style="cursor:pointer"></td>
                                                <td class="text-muted small">{{ idx + 1 }}</td>
                                                <td class="small">{{ formatDate(b.created_at) }}</td>
                                                <td class="small">{{ b.size ? formatBytes(b.size) : '-' }}</td>
                                                <td class="small text-muted" :title="b.notes">{{ b.notes ? b.notes.substring(0, 50) : '-' }}</td>
                                                <td>
                                                    <span v-if="b.status === 'completed'" class="badge bg-success">完成</span>
                                                    <span v-else-if="b.status === 'running'" class="badge bg-warning text-dark">{{ b.progress }}%</span>
                                                    <span v-else-if="b.status === 'pending'" class="badge bg-info">等待中</span>
                                                    <span v-else class="badge bg-danger">失败</span>
                                                </td>
                                                <td>
                                                    <div class="d-flex gap-1">
                                                        <button v-if="b.status === 'completed'" class="btn btn-outline-success btn-sm" @click="restoreLxcBackup(b)" title="恢复此备份">
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                                        </button>
                                                        <button v-if="b.status !== 'running' && b.status !== 'pending'" class="btn btn-outline-danger btn-sm" @click="deleteLxcBackup(b.id, lxcBackupCtId)" title="删除备份">
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                                        </button>
                                                    </div>
                                                </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div v-if="lxcBackups.some(b => b.status === 'running')" class="card-footer">
                        <div v-for="b in lxcBackups.filter(b => b.status === 'running')" :key="'prog-'+b.id" class="mb-1">
                            <small class="text-muted d-flex justify-content-between"><span>备份中...</span><span>{{ b.progress }}%</span></small>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" :style="{width: b.progress + '%'}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header"><h6 class="mb-0">备份限制信息</h6></div>
                    <div class="card-body">
                        <div class="row text-center g-2">
                            <div class="col-6">
                                <div class="border rounded p-2">
                                    <div class="small" style="color: var(--text-secondary); opacity: 0.75;">当前备份数</div>
                                    <div class="fw-bold" :class="lxcBackupLimits.current >= lxcBackupLimits.max_per_vm ? 'text-danger' : ''" style="color: var(--text-primary);">
                                        {{ lxcBackupLimits.current }} / {{ lxcBackupLimits.max_per_vm }}
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="border rounded p-2">
                                    <div class="small" style="color: var(--text-secondary); opacity: 0.75;">今日创建</div>
                                    <div class="fw-bold" :class="lxcBackupLimits.today_creates >= lxcBackupLimits.daily_limit ? 'text-danger' : ''" style="color: var(--text-primary);">
                                        {{ lxcBackupLimits.today_creates }} / {{ lxcBackupLimits.daily_limit }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- VM/LXC 操作确认弹窗 -->
<div class="vm-detail-modal" :class="{ show: confirmState?.vmId !== null || lxcConfirmState?.ctId !== null }" @click.self="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">
    <div class="modal-content" style="max-width:440px">
        <div class="modal-header">
            <h2 class="modal-title">操作确认</h2>
            <button class="modal-close" @click="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">✕</button>
        </div>
        <div class="modal-body" style="padding:24px 28px;text-align:center">
            <p style="font-size:15px;color:var(--text-primary);line-height:1.6;margin:0 0 20px">{{ confirmState?.vmId !== null ? confirmActionText : confirmLxcActionText }}</p>
            <div style="display:flex;gap:10px;justify-content:center">
                <button class="table-btn btn-danger" style="padding:8px 28px;font-size:14px" @click="confirmState?.vmId !== null ? confirmAction(userVms.find(function(v){return v.id===confirmState.vmId})||userVms[0]) : confirmLxcAction(userLxcContainers.find(function(c){return c.ct_id===lxcConfirmState.ctId})||userLxcContainers[0])">确认执行</button>
                <button class="table-btn" style="padding:8px 28px;font-size:14px" @click="confirmState?.vmId !== null ? cancelConfirm() : cancelLxcConfirm()">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- VM/CT 详情监控弹窗 -->
<div class="vm-detail-modal" :class="{ show: showVmDetail }" @click.self="closeVmDetail()">
    <div class="modal-content" style="max-width:720px">
        <div class="modal-header">
            <h2 class="modal-title">{{ detailVm._isLxc ? (detailVm.name || ('CT ' + detailVm.vm_id)) : (detailVm.name || ('VM ' + detailVm.vm_id)) }} 详情</h2>
            <button class="modal-close" @click="closeVmDetail()">✕</button>
        </div>
        <div class="modal-body">
            <!-- 基本信息区域 -->
            <div class="info-card">
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">{{ detailVm._isLxc ? '容器ID' : '虚拟机ID' }}</span><span class="info-value">{{ detailVm.vm_id || '-' }}</span></div>
                    <div class="info-item"><span class="info-label">内网IP</span><span class="info-value">{{ detailVm.ip || '-' }}</span></div>
                    <div class="info-item"><span class="info-label">硬件配置</span><span class="info-value">{{ detailVmConfigStr }}</span></div>
                    <div class="info-item"><span class="info-label">续费价格</span><span class="info-value">{{ detailVm.renewal_price ? detailVm.renewal_price + '元/' + (detailVm.renewal_period === 'year' ? '年' : '月') : '-' }}</span></div>
                    <div class="info-item">
                        <span class="info-label">到期时间</span>
                        <span class="info-value" :class="detailVm.expiration_date && new Date(detailVm.expiration_date) < new Date() ? 'text-danger' : ''">{{ detailVm.expiration_date ? formatDate(detailVm.expiration_date) : '未设置' }}</span>
                    </div>
                    <div class="info-item"><span class="info-label">{{ detailVm._isLxc ? '镜像' : '操作系统' }}</span><span class="info-value">{{ detailVmOsStr }}</span></div>
                    <div class="info-item"><span class="info-label">运行状态</span><span class="info-value">{{ detailVmStatusStr }}</span></div>
                    <div class="info-item"><span class="info-label">运行时长</span><span class="info-value">{{ detailVmUptimeStr }}</span></div>
                </div>
            </div>
            <!-- 监控图表区域 -->
            <h4 style="font-size:16px;color:var(--text-secondary);margin-bottom:16px;">实时性能监控</h4>
            <div class="chart-grid">
                <div class="chart-card"><div class="chart-title">CPU 使用率 (%)</div><canvas id="detailCpuChart"></canvas></div>
                <div class="chart-card"><div class="chart-title">内存使用率 (%)</div><canvas id="detailMemChart"></canvas></div>
                <div class="chart-card"><div class="chart-title">网络流量 (Mbps)</div><canvas id="detailNetChart"></canvas></div>
                <div class="chart-card"><div class="chart-title">磁盘IO (MB/s)</div><canvas id="detailDiskChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<!-- 续费弹窗 -->
<div v-if="renewShow" class="modal" style="display:block;background:rgba(0,0,0,0.5);" @click.self="renewShow = false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">余额抵扣续费</h5><button class="btn-close" @click="renewShow = false"></button></div>
            <div class="modal-body">
                <p v-if="renewResource">续费资源：{{ renewResource.name || '资源' }}</p>
                <p v-if="renewResource">续费价格：¥{{ parseFloat(renewResource.renewal_price||0).toFixed(2) }} / {{ renewPeriodLabel(renewResource.renewal_period) }}</p>
                <p v-if="renewResource && renewResource.expire_time">到期时间：{{ renewResource.expire_time }} <span v-if="renewResource.expire_time" class="text-warning small">({{ daysUntilExpire(renewResource.expire_time) }})</span></p>
                <div class="mb-3">
                    <label class="form-label">计费周期</label>
                    <select class="form-select" v-model="renewFormPeriod" style="max-width:200px;">
                        <option value="month">月付（30天）</option>
                        <option value="quarter">季付（90天）</option>
                        <option value="year">年付（365天）</option>
                    </select>
                </div>
                <div class="mb-3"><label class="form-label">续费数量({{ renewPeriodLabel(renewFormPeriod) }})</label>
                    <input type="number" class="form-control" v-model.number="renewQuantity" min="1" step="1" style="max-width:120px;" @change="renewQuantity = Math.max(1, Math.floor(Math.abs(renewQuantity || 1)))"></div>
                <p v-if="renewResource">应付金额：¥{{ calcRenewTotal().toFixed(2) }}</p>
                <p>当前余额：¥{{ walletBalance }}</p>
                <div v-if="renewError" class="alert alert-danger py-2">{{ renewError }}</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" @click="renewShow = false">取消</button>
                <button class="btn btn-glass" @click="submitRenew">确认续费</button>
            </div>
        </div>
    </div>
</div>

<!-- VM 重置密码弹窗 -->
<div v-if="vmPwdShow" class="modal" style="display:block;background:rgba(0,0,0,0.5);" @click.self="vmPwdShow = false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">重置密码</h5><button class="btn-close" @click="vmPwdShow = false"></button></div>
            <div class="modal-body">
                <div v-if="vmPwdCiuser === false" class="alert alert-danger py-2 mb-0">当前虚拟机未配置Cloud-init驱动，请联系管理员！</div>
                <div v-else>
                    <p v-if="vmPwdResource">资源：{{ vmPwdResource.name || ('VM ' + vmPwdResource.vm_id) }}</p>
                    <p v-if="vmPwdResource">账号：{{ vmPwdCiuser }}</p>
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-control" v-model="vmPwdNewPassword" placeholder="至少6位">
                    </div>
                    <div v-if="vmPwdError" class="alert alert-danger py-2">{{ vmPwdError }}</div>
                </div>
            </div>
            <div class="modal-footer" v-if="vmPwdCiuser !== false">
                <button class="btn btn-secondary" @click="vmPwdShow = false">取消</button>
                <button class="btn btn-glass" @click="submitVmPasswordReset" :disabled="!vmPwdNewPassword || vmPwdNewPassword.length < 6">确认重置</button>
            </div>
            <div class="modal-footer" v-else>
                <button class="btn btn-secondary" @click="vmPwdShow = false">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 浮动下拉菜单（Teleport到body，避免表格overflow裁剪） -->
<div v-if="openDropdownId !== null" class="floating-dropdown-menu"
     :style="{ top: dropdownPos.top + 'px', left: dropdownPos.left + 'px' }"
     @click.stop>
    <template v-for="(item, idx) in dropdownItems" :key="idx">
        <span class="dropdown-item" :class="item.cls || ''" @click="execDropdownAction(item.action)">{{ item.label }}</span>
    </template>
</div>

</Teleport>

        <div class="modal-header"><h5 class="modal-title">确认订购</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="mb-3"><strong>{{ orderPackage.name }}</strong></div>

                    <option value="quarter">季付 (90天)</option>
