<head>

    <script>!function(){var d=document.documentElement;new MutationObserver(function(){document.body&&(document.body.setAttribute('data-theme',d.getAttribute('data-theme')||'dark'),this.disconnect())}).observe(d,{childList:!0,subtree:!0})}()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE 多用户控制面板 | 用户中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/lib/dompurify.min.js"></script>
    <style>.modal-backdrop{z-index:1050!important}.modal{z-index:1055!important}</style>

    <!-- ========== 统一双主题CSS变量系统 ========== -->
    <style>
        /* ===== 暗黑模式（默认） ===== */
        :root {
            --bg-page: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            --bg-sidebar: rgba(15, 23, 42, 0.9);
            --bg-card: rgba(30, 30, 50, 0.75);
            --bg-header: rgba(15, 23, 42, 0.85);
            --bg-input: rgba(30, 30, 50, 0.8);
            --bg-hover: rgba(99, 102, 241, 0.08);
            --bg-modal: rgba(20, 22, 35, 0.92);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(129, 140, 248, 0.15);
            --border-light: rgba(129, 140, 248, 0.08);
            --color-primary: #818cf8;
            --color-danger: #f87171;
            --color-success: #34d399;
            --color-warning: #fbbf24;
            --color-info: #38bdf8;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glass-bg: var(--bg-card);
            --glass-border: var(--border-color);
            --glass-shadow: var(--shadow-md);
            --glass-accent: rgba(99, 102, 241, 0.6);
            --glass-accent-hover: rgba(99, 102, 241, 0.85);
            --glass-text: var(--text-primary);
            --glass-text-muted: var(--text-muted);
            --glass-surface: var(--bg-card);
            --header-height: 64px;
            --sidebar-width: 220px;
        }

        /* ===== 明亮模式覆盖 ===== */
        [data-theme="light"] {
            --bg-page: linear-gradient(135deg, #f0f4ff 0%, #e6e9ff 100%);
            --bg-sidebar: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-header: rgba(255, 255, 255, 0.88);
            --bg-input: rgba(255, 255, 255, 0.9);
            --bg-hover: rgba(99, 102, 241, 0.06);
            --bg-modal: rgba(255, 255, 255, 0.94);
            --text-primary: #334155;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: rgba(99, 102, 241, 0.1);
            --border-light: rgba(99, 102, 241, 0.05);
            --color-primary: #6366f1;
            --color-danger: #ef4444;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-info: #3b82f6;
            --shadow-sm: 0 2px 8px rgba(99, 102, 241, 0.04);
            --shadow-md: 0 4px 20px rgba(99, 102, 241, 0.05);
            --shadow-lg: 0 8px 32px rgba(99, 102, 241, 0.08);
            --glass-bg: var(--bg-card);
            --glass-border: var(--border-color);
            --glass-shadow: var(--shadow-md);
            --glass-accent: rgba(79, 70, 229, 0.7);
            --glass-accent-hover: rgba(79, 70, 229, 0.95);
            --glass-text: var(--text-primary);
            --glass-text-muted: var(--text-muted);
            --glass-surface: var(--bg-card);
        }

        /* ===== 全局基础 & 过渡 ===== */
        * { box-sizing: border-box; }
        *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--bg-page);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary); overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* ===== Page Header ===== */
        .page-header {
            background: var(--bg-header);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .header-btn {
            color: var(--text-secondary);
            border-color: var(--border-color);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .header-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .theme-icon {
            width: 18px; height: 18px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .theme-icon:hover { transform: rotate(15deg); }

        /* ===== Sidebar ===== */
        .sidebar {
            background: var(--bg-sidebar);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .nav-item {
            color: var(--text-secondary);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .nav-item:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .nav-item.active {
            color: var(--color-primary);
            font-weight: 600;
        }

        /* ===== Sidebar Overlay ===== */
        .sidebar-overlay {
            background: rgba(0, 0, 0, 0.4);
            transition: opacity 0.3s ease;
        }
        [data-theme="light"] .sidebar-overlay {
            background: rgba(0, 0, 0, 0.2);
        }

        /* ===== Card 玻璃态 ===== */
        .main-wrap .card, .main-wrap .card-body {
            background: var(--bg-card);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color); border-radius: 14px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .main-wrap .card:hover {
            transform: none; box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
            border-opacity: 0.25;
        }

        /* ===== Nav Tabs 药丸风格 ===== */
        .nav-tabs {
            display: flex; gap: 4px; padding: 6px 8px;
            background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 10px; list-style: none; margin-bottom: 20px !important; flex-wrap: wrap;
            border-bottom: none !important;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .nav-tabs .nav-item { margin-bottom: 0; }
        .nav-tabs .nav-link {
            padding: 7px 18px; font-size: 13px; font-weight: 500; color: var(--text-secondary);
            background: transparent; border: none; border-radius: 7px; transition: all 0.2s ease; cursor: pointer;
            white-space: nowrap; position: relative;
        }
        .nav-tabs .nav-link::after { display: none !important; }
        .nav-tabs .nav-link:hover { color: var(--text-primary); background: var(--bg-hover); }
        .nav-tabs .nav-link.active {
            color: #fff; background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.15));
            box-shadow: 0 2px 12px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.08); font-weight: 600;
        }

        /* ===== Nav Pills 微调 ===== */
        .nav-pills {
            gap: 4px; padding: 4px;
            background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .nav-pills .nav-link {
            border-radius: 8px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .nav-pills .nav-link:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .nav-pills .nav-link.active {
            color: var(--color-primary);
            font-weight: 600;
            background: var(--bg-hover);
        }

        /* ===== 标题样式 ===== */
        h4 {
            font-size: 20px !important; font-weight: 700 !important; color: var(--text-primary) !important;
            letter-spacing: -0.3px; position: relative; padding-left: 14px; margin-bottom: 20px !important;
            transition: color 0.3s ease;
        }
        h4::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 20px; border-radius: 2px;
            background: linear-gradient(180deg, #6366F1, #8B5CF6);
        }
        h5.card-title { color: var(--text-primary) !important; transition: color 0.3s ease; }

        /* ===== 表格玻璃态 ===== */
        .table { color: var(--text-primary) !important; border-collapse: separate; border-spacing: 0; transition: color 0.3s ease;
            --bs-table-bg: transparent; --bs-table-accent-bg: transparent;
            --bs-table-hover-bg: rgba(99,102,241,0.04); --bs-table-active-bg: rgba(99,102,241,0.06); }
        thead th, .table thead th, .table-striped thead th {
            background: linear-gradient(180deg, rgba(99,102,241,0.10) 0%, rgba(139,92,246,0.05) 100%) !important; color: var(--text-secondary) !important;
            font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
            border-bottom: 2px solid rgba(99,102,241,0.18) !important;
            padding: 14px 18px; white-space: nowrap;
            transition: all 0.3s ease;
        }
        thead tr:first-child th:first-child, .table thead tr:first-child th:first-child, .table-striped tr:first-child th:first-child { border-radius: 12px 0 0 0 !important; }
        thead tr:first-child th:last-child, .table thead tr:last-child th:last-child, .table-striped tr:last-child th:last-child { border-radius: 0 12px 0 0 !important; }
        .table > thead, .table-striped > thead, .table-sm > thead { background: transparent !important; }
        .table td {
            border-bottom: 1px solid var(--border-light) !important; color: var(--text-primary) !important;
            transition: border-color 0.3s ease, color 0.3s ease, background-color 0.3s ease;
        }
        .table tbody tr:hover td { background: var(--bg-hover) !important; }

        /* ===== Badge 玻璃态色调 ===== */
        .badge {
            padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 6px; border: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .bg-success { color: var(--color-success) !important; background: color-mix(in srgb, var(--color-success) 12%, transparent) !important; }
        .bg-warning { color: var(--color-warning) !important; background: color-mix(in srgb, var(--color-warning) 12%, transparent) !important; }
        .bg-primary { color: var(--color-primary) !important; background: color-mix(in srgb, var(--color-primary) 12%, transparent) !important; }
        .bg-secondary { color: var(--text-secondary) !important; background: color-mix(in srgb, var(--text-secondary) 10%, transparent) !important; }
        .bg-info { color: var(--color-info) !important; background: color-mix(in srgb, var(--color-info) 12%, transparent) !important; }
        .bg-danger { color: var(--color-danger) !important; background: color-mix(in srgb, var(--color-danger) 12%, transparent) !important; }

        /* ===== 按钮微调 ===== */
        .btn-outline-light {
            border: 1px solid var(--border-color); color: var(--text-secondary);
            background: transparent;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .btn-outline-light:hover {
            background: var(--bg-hover); color: var(--text-primary);
        }

        /* ===== 玻璃态主按钮 ===== */
        .btn-glass {
            padding: 8px 24px; font-size: 14px; font-weight: 600; border-radius: 10px;
            border: 1px solid rgba(99,102,241,0.35); cursor: pointer;
            transition: all 0.25s ease, color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
            background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(139,92,246,0.16));
            color: #C7D2FE; box-shadow: 0 2px 12px rgba(99,102,241,0.18);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-glass:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(99,102,241,0.32), rgba(139,92,246,0.24));
            color: #E0E7FF; box-shadow: 0 6px 20px rgba(99,102,241,0.28);
            transform: translateY(-1px);
        }
        .btn-glass:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(99,102,241,0.2);
        }
        .btn-glass:disabled {
            opacity: 0.45; cursor: not-allowed; transform: none !important;
            filter: grayscale(0.4);
        }
        /* 明亮模式：加深背景确保可见 */
        [data-theme="light"] .btn-glass {
            background: linear-gradient(135deg, rgba(99,102,241,0.78), rgba(139,92,246,0.68));
            border-color: rgba(99,102,241,0.55); color: #fff;
            box-shadow: 0 2px 12px rgba(99,102,241,0.22);
        }
        [data-theme="light"] .btn-glass:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(99,102,241,0.88), rgba(139,92,246,0.78));
            box-shadow: 0 6px 20px rgba(99,102,241,0.32);
        }

        /* ===== Modal 增强 ===== */
        .modal-content {
            background: var(--bg-modal);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* ===== Alert 覆盖 ===== */
        .alert-warning {
            background: color-mix(in srgb, var(--color-warning) 10%, transparent) !important;
            border: 1px solid color-mix(in srgb, var(--color-warning) 25%, transparent) !important;
            color: var(--color-warning) !important;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        .alert-warning .svg-icon { color: var(--color-warning); }

        /* ===== 文字颜色工具类 ===== */
        .text-muted { color: var(--text-muted) !important; transition: color 0.3s ease; }
        .text-success { color: var(--color-success) !important; transition: color 0.3s ease; }
        .text-warning { color: var(--color-warning) !important; transition: color 0.3s ease; }

        /* ===== Header Avatar (img标签) ===== */
        .header-user-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            object-fit: cover; border: 1px solid var(--border-color);
            flex-shrink: 0; cursor: pointer;
            transition: border-color 0.3s ease;
        }
        .header-user-avatar:hover { border-color: var(--color-primary); }

        /* ===== Form 控件 ===== */
        .form-control, .form-select {
            background: var(--bg-input) !important;
            border-color: var(--border-color) !important;
            color: var(--text-primary) !important;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .form-control::placeholder { color: var(--text-muted) !important; }
        .input-group-text {
            background: var(--bg-hover) !important;
            border-color: var(--border-color) !important;
            color: var(--text-secondary) !important;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        /* ===== Sidebar 子导航项样式 ===== */
        .nav-group-label {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 20px 6px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted);
            pointer-events: none; user-select: none;
            transition: color 0.3s ease;
        }

        .sub-nav-item {
            padding-left: 36px !important;
            font-size: 13px !important;
            height: 40px !important;
            color: var(--text-secondary);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .sub-nav-item .nav-icon {
            width: 16px; height: 16px;
            font-size: 14px;
        }
        .sub-nav-item:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .sub-nav-item.active {
            background: color-mix(in srgb, var(--color-primary) 12%, transparent) !important;
            border-left: 3px solid var(--color-primary) !important;
            color: var(--color-primary) !important;
            font-weight: 500;
        }

        /* ===== 导航项上的 Badge（未读数） ===== */
        .nav-badge {
            margin-left: auto;
            min-width: 18px; height: 18px;
            border-radius: 9px;
            background: var(--color-danger);
            color: #fff;
            font-size: 10px; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0 5px; line-height: 1;
            transition: background-color 0.3s ease;
        }

        /* ===== Sidebar Toggle ===== */
        .sidebar-toggle {
            display: none; background: none; border: 1px solid var(--border-color);
            color: var(--text-secondary); font-size: 22px; cursor: pointer;
            padding: 6px 10px; border-radius: 8px; transition: all 0.3s ease; line-height: 1;
        }
        .sidebar-toggle:hover { background: var(--bg-hover); color: var(--color-primary); }

        /* ===== Avatar Circle/Img ===== */
        .avatar-circle { border-radius: 50%; overflow: hidden; }
        .avatar-img { object-fit: cover; border: 2px solid var(--border-color); transition: border-color 0.3s ease; }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; top: var(--header-height, 64px); bottom: 0; left: 0; z-index: 1040; width: var(--sidebar-width, 220px); }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0, 0, 0, 0.4); }
            .sidebar-toggle { display: inline-flex !important; }
            .main-wrap { margin-left: 0 !important; padding: 12px; }
            .page-header { padding: 0 12px; }
            .nav-tabs { padding: 4px; gap: 2px; }
            .nav-tabs .nav-link { padding: 6px 12px; font-size: 12px; }
            h4 { font-size: 17px !important; }
            .card { border-radius: 12px !important; }
            .avatar-circle { width: 60px; height: 60px; }
            .avatar-img { width: 60px; height: 60px; }
            .sidebar-overlay.show { left: var(--sidebar-width, 220px); }
        }
        @media (max-width: 576px) {
            .main-wrap { padding: 10px; } .page-header { padding: 0 10px; }
            .nav-tabs .nav-link { padding: 5px 10px; font-size: 11px; }
            h4 { font-size: 16px !important; }
        }
    </style>
    <style>[data-theme="light"] thead th, [data-theme="light"] .table thead th, [data-theme="light"] .table-striped thead th {
        background: linear-gradient(180deg, rgba(99,102,241,0.07) 0%, rgba(139,92,246,0.035) 100%) !important;
        border-bottom: 2px solid rgba(99,102,241,0.14) !important;
        color: #6b7280 !important;
    }</style>
</head>
<body>

  <!-- ========== 1. Page Header (Fixed Top Bar 64px) ========== -->
  <header class="page-header">
    <div class="header-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="brand-logo navbar-brand">PVE 面板</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="location.reload()" title="刷新"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg></button>
      <button class="header-btn" id="themeToggle" title="主题切换">
        <svg class="theme-icon" id="themeIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <div class="dropdown">
        <div class="user-info-dropdown" data-bs-toggle="dropdown">
          <img class="header-user-avatar" id="headerAvatar" alt="" />
          <span id="headerUsername">用户名</span>
        </div>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="/dashboard.html"><i class="me-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></i>仪表盘</a></li>
          <li><hr class="dropdown-divider"></li>

            <div v-if="activeSubTab === 'settings'">

                                    <div class="card-body d-flex flex-column">

                                <span class="visually-hidden">加载中...</span>
                            </div>

                                <div class="message-header">

                                        {{ {1:'系统公告',2:'业务通知',3:'续费提醒',4:'工单消息',5:'客服私聊'}[msg.type] || '消息' }}
                                    </span>
                                    <span class="d-flex align-items-center gap-2">
                                        <span class="message-status-badge" :class="msg.is_read ? 'status-read' : 'status-unread'">{{ msg.is_read ? '已读' : '未读' }}</span>
                                        <span class="message-time">{{ formatDate(msg.created_at) }}</span>
                                    </span>
                                </div>
                                <div class="message-title">{{ msg.title }}</div>
                                <div class="message-preview">{{ trimContent(msg.content) }}</div>

            <div v-if="activeSubTab === 'security'">

                                <h5 class="card-title mb-3">登录设备管理</h5>

                                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>

                                            <tr v-for="d in devices" :key="d.id">

                                                </td>

                                    <button class="btn btn-primary" @click="openTwofaSetup">绑定两步验证</button>
                                    <p class="text-muted small mt-2 mb-0">提示：需先在手机安装 Google Authenticator 或 Authy 等 TOTP 应用</p>
                                </template>
                                <template v-else>
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h5 class="card-title mb-1">二次验证（2FA）</h5>
                                        <span class="badge bg-success" style="font-size:11px;">✅ 已启用</span>

                                    </div>
                                    <p class="text-muted small mb-0">剩余恢复码: {{ twofaRecoveryCount }} 个</p>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

            <!-- 余额充值 -->

                        <span v-else>提交充值</span>
                    </button>
                </div>

            <!-- 交易明细 -->

                                <td><span :class="tx.trade_type === 'recharge' ? 'badge bg-success' : 'badge bg-info'">{{ tx.trade_type === 'recharge' ? '余额充值' : '服务器续费' }}</span></td>
                                <td>¥{{ tx.amount }}</td>
                            </tr>
                            <tr v-if="!txList || txList.length === 0"><td colspan="6" class="text-center text-muted py-4">暂无交易记录</td></tr>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.11/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script>
        const { createApp, ref, onMounted, onUnmounted, watch } = Vue;

        const App = {
            template: '#appTemplate',
            setup() {
                const user = ref(null);
                const activeSubTab = ref(localStorage.getItem('ucenter_subtab') || 'settings');
                const navItems = ref([]);
                const currentNavId = ref('user-center');

                const profileForm = ref({ username: '', password: '', bio: '', avatar: '', email: '', emailVerified: false });
                const memos = ref([]);
                const memosLoading = ref(false);
                const editMemoForm = ref({ id: null, title: '', content: '' });
                const unreadCount = ref(0);
                const messages = ref([]);
                const messagesLoading = ref(false);
                const msgType = ref('all');
                const currentMsg = ref({ title: '', content: '', type: 1, created_at: '' });

                const devices = ref([]);
                const devicesLoading = ref(false);
                const currentDeviceId = ref(0);

                const twofaEnabled = ref(false);
                const twofaRecoveryCount = ref(0);
                const twofaSecret = ref('');
                const twofaQrcode = ref('');
                const twofaSetupCode = ref('');
                const twofaDisablePassword = ref('');
                const twofaRecoveryCodes = ref([]);

                // 钱包
                const walletBalance = ref('0.00');
                const payMethods = ref({ alipay: false, wxpay: false, min_amount: 0.01, max_amount: 999999.99 });
                const rechargeAmount = ref('');
                const rechargeMethod = ref('');
                const rechargeSubmitting = ref(false);
                const rechargeError = ref('');
                const txList = ref([]);
                const txTotal = ref(0);
                const txPage = ref(1);
                const txFilter = ref({ start_time: '', end_time: '', trade_type: '', order_no: '' });
                const myOrders = ref([]);

                const parseMarkdown = (text) => {
                    if (!text) return '';
                    try {
                        return DOMPurify.sanitize(marked.parse(text));
                    } catch {
                        return text;
                    }
                };

                const customAlertMessage = ref('');
                const customConfirmMessage = ref('');
                const customConfirmResolve = ref(null);

                window.alert = (message) => {
                    customAlertMessage.value = message;
                    const el = document.getElementById('customAlertModal');
                    if (el) {
                        if (document.activeElement && document.activeElement !== document.body) {
                            document.activeElement.blur();
                        }
                        document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                        document.body.classList.remove('modal-open');
                        document.body.style.removeProperty('padding-right');
                        el.addEventListener('hide.bs.modal', function onHide() {
                            if (document.activeElement && document.activeElement !== document.body) {
                                document.activeElement.blur();
                            }
                        }, { once: true });
                        var oldModal = bootstrap.Modal.getInstance(el);
                        if (oldModal) oldModal.dispose();
                        new bootstrap.Modal(el, { focus: false }).show();
                    }
                };

                window.customConfirm = (message) => {
                    return new Promise((resolve) => {
                        customConfirmMessage.value = message;
                        customConfirmResolve.value = resolve;
                        const el = document.getElementById('customConfirmModal');
                        if (!el) { resolve(false); return; }
                        if (document.activeElement && document.activeElement !== document.body) {
                            document.activeElement.blur();
                        }
                        document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                        document.body.classList.remove('modal-open');
                        document.body.style.removeProperty('padding-right');
                        el.addEventListener('hide.bs.modal', function onHide() {
                            if (document.activeElement && document.activeElement !== document.body) {
                                document.activeElement.blur();
                            }
                        }, { once: true });
                        var oldModal = bootstrap.Modal.getInstance(el);
                        if (oldModal) oldModal.dispose();
                        new bootstrap.Modal(el, { focus: false }).show();
                    });
                };

                // ===== 钱包相关 =====
                const loadWalletBalance = async () => {
                    try {
                        const res = await api('/wallet/balance');
                        walletBalance.value = res.balance || '0.00';
                    } catch (e) { console.error('钱包余额加载失败', e); }
                };

                const loadPayMethods = async () => {
                    try {
                        const res = await api('/wallet/pay-config');
                        payMethods.value = res;
                    } catch (e) { console.error('支付配置加载失败', e); }
                };

                const submitRecharge = async () => {
                    const amount = parseFloat(rechargeAmount.value);
                    if (isNaN(amount) || amount <= 0) { rechargeError.value = '请输入有效的充值金额'; return; }
                    const min = parseFloat(payMethods.value.min_amount || 0.01);
                    if (amount < min) { rechargeError.value = '最低充值金额为 ' + min.toFixed(2) + ' 元'; return; }
                    if (!rechargeMethod.value) { rechargeError.value = '请选择支付方式'; return; }
                    rechargeSubmitting.value = true;
                    rechargeError.value = '';
                    try {
                        const res = await api('/wallet/recharge', { method: 'POST', body: { amount: amount.toFixed(2), pay_method: rechargeMethod.value } });
                        if (res.success && res.redirect_url) {
                            window.open(res.redirect_url, '_blank');
                            rechargeAmount.value = ''; rechargeMethod.value = '';
                        } else { rechargeError.value = res.error || '创建订单失败'; }
                    } catch (e) { rechargeError.value = '请求失败，请稍后重试'; }
                    rechargeSubmitting.value = false;
                };

                const loadTx = async (page) => {
                    txPage.value = page || 1;
                    try {
                        const params = { page: txPage.value, limit: 10 };
                        const f = txFilter.value;
                        if (f.start_time) params.start_time = f.start_time;
                        if (f.end_time) params.end_time = f.end_time;
                        if (f.trade_type) params.trade_type = f.trade_type;
                        if (f.order_no) params.order_no = f.order_no;
                        const res = await api('/wallet/transactions?' + new URLSearchParams(params));
                        txList.value = res.data || [];
                        txTotal.value = res.total || 0;
                    } catch (e) { console.error('加载交易明细失败', e); }
                };

                const copyOrderNo = (orderNo) => {
                    if (navigator.clipboard) { navigator.clipboard.writeText(orderNo).then(() => alert('订单号已复制')); }
                    else { const el = document.createElement('textarea'); el.value = orderNo; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert('订单号已复制'); }
                };

                const loadMyOrders = async () => {
                    try { myOrders.value = await api('/orders'); } catch (e) { console.error('加载订单失败', e); }
                };

                // 初始化加载钱包数据
                loadWalletBalance();
                loadPayMethods();

                const handleReturnPayment = async () => {
                    var qs = window.location.search;
                    if (!qs || qs.indexOf('trade_status=TRADE_SUCCESS') === -1) return;
                    try {
                        var res = await api('/wallet/return' + qs);
                        if (res.success) {
                            window.history.replaceState({}, '', window.location.pathname + (activeSubTab.value !== 'settings' ? '#' + activeSubTab.value : ''));
                            loadWalletBalance();
                        }
                    } catch (e) {
                        console.error('同步回调处理失败', e);
                    }
                };

                const confirmOk = () => {
                    const resolve = customConfirmResolve.value;
                    if (resolve) {
                        customConfirmResolve.value = null;
                        resolve(true);
                    }
                    if (document.activeElement && document.activeElement !== document.body) {
                        document.activeElement.blur();
                    }
                    const el = document.getElementById('customConfirmModal');
                    if (el) {
                        const modal = bootstrap.Modal.getInstance(el);
                        if (modal) modal.hide();
                    }
                };

                const confirmCancel = () => {
                    const resolve = customConfirmResolve.value;
                    if (resolve) {
                        customConfirmResolve.value = null;
                        resolve(false);
                    }
                    if (document.activeElement && document.activeElement !== document.body) {
                        document.activeElement.blur();
                    }
                    const el = document.getElementById('customConfirmModal');
                    if (el) {
                        const modal = bootstrap.Modal.getInstance(el);
                        if (modal) modal.hide();
                    }
                };

                const bsModalShow = (id) => {
                    document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                    document.body.classList.remove('modal-open');
                    document.body.style.removeProperty('padding-right');
                    if (document.activeElement && document.activeElement !== document.body) {
                        document.activeElement.blur();
                    }
                    const el = document.getElementById(id);
                    if (!el) return;
                    const old = bootstrap.Modal.getInstance(el);
                    if (old) old.dispose();
                    window.Vue.nextTick(() => new bootstrap.Modal(el, { focus: false }).show());
                };
                const bsModalHide = (id) => {
                    if (document.activeElement && document.activeElement !== document.body) {
                        document.activeElement.blur();
                    }
                    const el = document.getElementById(id);
                    if (el) {
                        const modal = bootstrap.Modal.getInstance(el);
                        if (modal) modal.hide();
                    }
                };
                // 统一子Tab切换方法（侧边栏导航调用）
                const switchSubTab = async (tab) => {
                    activeSubTab.value = tab;
                    // 根据tab懒加载数据
                    if (tab === 'memos') await loadMemos();
                    if (tab === 'messages') await loadMessages();
                    if (tab === 'security') { await loadDevices(); await loadTwofaStatus(); }
                    // settings 数据在 onMounted 时已通过 loadProfile 加载
                    // 移动端自动收起侧边栏
                    if (window.innerWidth <= 768) {
                        var sb = document.getElementById('sidebar');
                        var ol = document.getElementById('sidebarOverlay');
                        if (sb) sb.classList.remove('open');
                        if (ol) ol.style.display = 'none';
                    }
                };

                const loadProfile = async () => {
                    try {
                        const profile = await api('/user/profile');
                        profileForm.value = {
                            username: profile.username,
                            password: '',
                            bio: profile.bio || '',
                            avatar: profile.avatar || '',
                            email: profile.email || '',
                            emailVerified: profile.emailVerified || false
                        };
                        if (user.value) {
                            user.value = { ...user.value, ...profile };
                        }
                    } catch (e) {
                        console.error('加载用户资料失败', e);
                    }
                };

                const handleEmailVerification = () => {
                    var params = new URLSearchParams(window.location.search);
                    var verified = params.get('email_verified');
                    if (verified === '1') {
                        setTimeout(function() { alert('邮箱验证成功！'); }, 500);
                        var url = new URL(window.location);
                        url.searchParams.delete('email_verified');
                        url.searchParams.delete('reason');
                        window.history.replaceState({}, '', url.toString());
                    } else if (verified === '0') {
                        var reason = params.get('reason');
                        var msg = '邮箱验证失败';
                        if (reason === 'expired') msg = '验证链接已过期，请重新发送验证邮件';
                        else if (reason === 'user_not_found') msg = '用户不存在';
                        else if (reason === 'error') msg = '验证过程出错，请重试';
                        setTimeout(function() { alert(msg); }, 500);
                        var url = new URL(window.location);
                        url.searchParams.delete('email_verified');
                        url.searchParams.delete('reason');
                        window.history.replaceState({}, '', url.toString());
                    }
                };

                const loadMemos = async () => {
                    memosLoading.value = true;
                    try {
                        memos.value = await api('/user/memos');
                    } catch (e) {
                        console.error('加载备忘录失败', e);
                    } finally {
                        memosLoading.value = false;
                    }
                };

                const updateProfile = async () => {
                    try {
                        const data = {
                            username: profileForm.value.username,
                            bio: profileForm.value.bio
                        };
                        if (profileForm.value.password) {
                            data.password = profileForm.value.password;
                        }
                        const result = await api('/user/profile', {
                            method: 'PUT',
                            body: JSON.stringify(data)
                        });
                        user.value = result.user;
                        alert('资料更新成功！');
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const handleAvatarUpload = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 2 * 1024 * 1024) {
                            alert('头像文件大小不能超过2MB');
                            e.target.value = '';
                            return;
                        }
                        if (!['image/jpeg', 'image/png'].includes(file.type)) {
                            alert('仅支持 JPG 和 PNG 格式');
                            e.target.value = '';
                            return;
                        }
                        try {
                            const formData = new FormData();
                            formData.append('avatar', file);
                            const token = localStorage.getItem('token');
                            const response = await fetch('/api/user/avatar', {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                },
                                body: formData
                            });
                            if (!response.ok) {
                                const data = await response.json();
                                throw new Error(data.error || '上传失败');
                            }
                            const data = await response.json();
                            profileForm.value.avatar = data.avatar;
                            if (user.value) {
                                user.value.avatar = data.avatar;
                            }
                            alert('头像上传成功！');
                        } catch (e) {
                            alert(e.message);
                        }
                    }
                };

                const bindEmail = async () => {
                    try {
                        const result = await api('/user/email', {
                            method: 'PUT',
                            body: JSON.stringify({ email: profileForm.value.email })
                        });
                        profileForm.value.emailVerified = false;
                        user.value.email = result.user.email;
                        user.value.emailVerified = false;
                        alert(result.message);
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const resendVerification = async () => {
                    try {
                        const result = await api('/user/email', {
                            method: 'PUT',
                            body: JSON.stringify({ email: profileForm.value.email })
                        });
                        alert(result.message);
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const addMemo = () => {
                    editMemoForm.value = { id: null, title: '', content: '' };
                    bsModalShow('memoModal');
                };

                const editMemo = (memo) => {
                    editMemoForm.value = { id: memo.id, title: memo.title, content: memo.content };
                    bsModalShow('memoModal');
                };

                const saveMemo = async () => {
                    try {
                        if (editMemoForm.value.id) {
                            await api(`/user/memos/${editMemoForm.value.id}`, {
                                method: 'PUT',
                                body: JSON.stringify({
                                    title: editMemoForm.value.title,
                                    content: editMemoForm.value.content
                                })
                            });
                        } else {
                            await api('/user/memos', {
                                method: 'POST',
                                body: JSON.stringify({
                                    title: editMemoForm.value.title,
                                    content: editMemoForm.value.content
                                })
                            });
                        }
                        bsModalHide('memoModal');
                        await loadMemos();
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const deleteMemo = async (id) => {
                    if (!await window.customConfirm('确定删除此备忘录？')) return;
                    try {
                        await api(`/user/memos/${id}`, { method: 'DELETE' });
                        await loadMemos();
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const loadMessages = async () => {
                    messagesLoading.value = true;
                    try {
                        const data = await api('/messages?type=' + msgType.value);
                        messages.value = data.list || [];
                    } catch (e) {
                        console.error('加载消息失败', e);
                    } finally {
                        messagesLoading.value = false;
                    }
                };

                const viewMessage = async (msg) => {
                    try {
                        const detail = await api('/messages/' + msg.id);
                        currentMsg.value = detail;
                        if (!msg.is_read) {
                            msg.is_read = 1;
                            loadUnreadCount();
                        }
                        bsModalShow('messageDetailModal');
                    } catch (e) {
                        alert('获取消息详情失败');
                    }
                };

                const markAllRead = async () => {
                    try {
                        await api('/messages/read-all', { method: 'PUT' });
                        messages.value.forEach(m => m.is_read = 1);
                        unreadCount.value = 0;
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const deleteMessage = async (id) => {
                    if (!await window.customConfirm('确定删除此消息？')) return;
                    try {
                        await api('/messages/' + id, { method: 'DELETE' });
                        messages.value = messages.value.filter(m => m.id !== id);
                        bsModalHide('messageDetailModal');
                        loadUnreadCount();
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const clearAllMessages = async () => {
                    if (!await window.customConfirm('确定清空所有已读消息？未读消息将保留。')) return;
                    try {
                        await api('/messages', { method: 'DELETE' });
                        messages.value = messages.value.filter(m => !m.is_read);
                        loadUnreadCount();
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const trimContent = (content) => {
                    if (!content) return '';
                    const text = content.replace(/<[^>]*>/g, '');
                    return text.length > 100 ? text.substring(0, 100) + '...' : text;
                };

                const loadUnreadCount = async () => {
                    try {
                        const data = await api('/messages/unread-count');
                        unreadCount.value = data.count;
                    } catch (e) {}
                };

                const loadDevices = async () => {
                    devicesLoading.value = true;
                    try {
                        const refreshToken = localStorage.getItem('refreshToken');
                        const data = await api('/user/devices');
                        devices.value = data;
                        if (refreshToken) {
                            const current = data.find(d => d.token === refreshToken);
                            if (current) currentDeviceId.value = current.id;
                        }
                    } catch (e) {
                    } finally {
                        devicesLoading.value = false;
                    }
                };

                const revokeDevice = async (id) => {
                    if (await window.customConfirm('确定要将该设备下线吗？')) {
                        try {
                            await api(`/user/devices/${id}`, { method: 'DELETE' });
                            devices.value = devices.value.filter(d => d.id !== id);
                            alert('设备已下线');
                        } catch (e) {
                            alert(e.message);
                        }
                    }
                };

                const revokeOtherDevices = async () => {
                    if (await window.customConfirm('确定要下线除当前设备外的所有设备吗？')) {
                        try {
                            const refreshToken = localStorage.getItem('refreshToken');
                            await api('/user/devices', {
                                method: 'DELETE',
                                body: JSON.stringify({ refreshToken })
                            });
                            devices.value = devices.value.filter(d => d.id === currentDeviceId.value);
                            alert('其他设备已下线');
                        } catch (e) {
                            alert(e.message);
                        }
                    }
                };

                const loadTwofaStatus = async () => {
                    try {
                        const data = await api('/user/2fa/status');
                        twofaEnabled.value = data.enabled;
                        twofaRecoveryCount.value = data.recovery_count || 0;
                    } catch (e) {
                        twofaEnabled.value = false;
                        twofaRecoveryCount.value = 0;
                    }
                };

                const openTwofaSetup = async () => {
                    try {
                        const data = await api('/user/2fa/setup', { method: 'POST' });
                        twofaSecret.value = data.secret;
                        twofaQrcode.value = data.qrcode;
                        twofaSetupCode.value = '';
                        await Vue.nextTick();
                        await new Promise(r => setTimeout(r, 100));
                        bsModalShow('twofaSetupModal');
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const verifyTwofaSetup = async () => {
                    try {
                        const data = await api('/user/2fa/verify', {
                            method: 'POST',
                            body: JSON.stringify({ code: twofaSetupCode.value })
                        });
                        bsModalHide('twofaSetupModal');
                        twofaEnabled.value = true;
                        twofaRecoveryCodes.value = (data.recovery_codes || []).map((code, i) => ({ id: i + 1, code, used: 0, created_at: new Date().toISOString() }));
                        twofaRecoveryCount.value = twofaRecoveryCodes.value.length;
                        setTimeout(() => bsModalShow('twofaRecoveryModal'), 300);
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const loadTwofaRecoveryCodes = async () => {
                    try {
                        const data = await api('/user/2fa/recovery-codes');
                        twofaRecoveryCodes.value = data.codes || [];
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const showRecoveryCodes = async () => {
                    await loadTwofaRecoveryCodes();
                    bsModalShow('twofaRecoveryModal');
                };

                const copyRecoveryCodes = async () => {
                    const codes = twofaRecoveryCodes.value.filter(rc => !rc.used).map(rc => rc.code);
                    if (codes.length === 0) { alert('没有未使用的恢复码'); return; }
                    const text = codes.join('\n');
                    bsModalHide('twofaRecoveryModal');
                    await new Promise(r => setTimeout(r, 300));
                    try {
                        await navigator.clipboard.writeText(text);
                    } catch {
                        const ta = document.createElement('textarea');
                        ta.value = text;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                    }
                    const el = document.getElementById('customAlertModal');
                    if (el) {
                        el.addEventListener('hidden.bs.modal', function onHidden() {
                            el.removeEventListener('hidden.bs.modal', onHidden);
                            bsModalShow('twofaRecoveryModal');
                        }, { once: true });
                    }
                    customAlertMessage.value = '未使用的恢复码已复制到剪贴板';
                    document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                    document.body.classList.remove('modal-open');
                    document.body.style.removeProperty('padding-right');
                    var oldModal = bootstrap.Modal.getInstance(el);
                    if (oldModal) oldModal.dispose();
                    new bootstrap.Modal(el, { focus: false }).show();
                };

                const copySingleCode = async (code) => {
                    bsModalHide('twofaRecoveryModal');
                    await new Promise(r => setTimeout(r, 300));
                    try {
                        await navigator.clipboard.writeText(code);
                    } catch {
                        const ta = document.createElement('textarea');
                        ta.value = code;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                    }
                    const el = document.getElementById('customAlertModal');
                    if (el) {
                        el.addEventListener('hidden.bs.modal', function onHidden() {
                            el.removeEventListener('hidden.bs.modal', onHidden);
                            bsModalShow('twofaRecoveryModal');
                        }, { once: true });
                    }
                    customAlertMessage.value = '恢复码已复制';
                    document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                    document.body.classList.remove('modal-open');
                    document.body.style.removeProperty('padding-right');
                    var oldModal = bootstrap.Modal.getInstance(el);
                    if (oldModal) oldModal.dispose();
                    new bootstrap.Modal(el, { focus: false }).show();
                };

                const downloadRecoveryCodes = () => {
                    const text = twofaRecoveryCodes.value.map(rc => (rc.used ? '[已使用] ' : '') + rc.code).join('\n');
                    const blob = new Blob([text], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'recovery-codes.txt';
                    a.click();
                    URL.revokeObjectURL(url);
                };

                const regenerateRecoveryCodes = async () => {
                    bsModalHide('twofaRecoveryModal');
                    await new Promise(r => setTimeout(r, 300));
                    if (!await window.customConfirm('确定要重新生成恢复码吗？当前的恢复码将全部作废。')) {
                        bsModalShow('twofaRecoveryModal');
                        return;
                    }
                    try {
                        const data = await api('/user/2fa/recovery-codes/regenerate', { method: 'POST' });
                        twofaRecoveryCodes.value = (data.recovery_codes || []).map((code, i) => ({ id: i + 1, code, used: 0, created_at: new Date().toISOString() }));
                        twofaRecoveryCount.value = twofaRecoveryCodes.value.length;
                        const el = document.getElementById('customAlertModal');
                        if (el) {
                            el.addEventListener('hidden.bs.modal', function onHidden() {
                                el.removeEventListener('hidden.bs.modal', onHidden);
                                bsModalShow('twofaRecoveryModal');
                            }, { once: true });
                        }
                        customAlertMessage.value = '恢复码已重新生成';
                        document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                        document.body.classList.remove('modal-open');
                        document.body.style.removeProperty('padding-right');
                        var oldModal = bootstrap.Modal.getInstance(el);
                        if (oldModal) oldModal.dispose();
                        new bootstrap.Modal(el, { focus: false }).show();
                    } catch (e) {
                        bsModalShow('twofaRecoveryModal');
                        await new Promise(r => setTimeout(r, 300));
                        alert('重新生成恢复码失败：' + e.message);
                    }
                };

                const openDisableTwofa = () => {
                    twofaDisablePassword.value = '';
                    bsModalShow('twofaDisableModal');
                };

                const disableTwofa = async () => {
                    try {
                        await api('/user/2fa/disable', {
                            method: 'POST',
                            body: JSON.stringify({ password: twofaDisablePassword.value })
                        });
                        bsModalHide('twofaDisableModal');
                        twofaEnabled.value = false;
                        twofaRecoveryCount.value = 0;
                        twofaDisablePassword.value = '';
                        alert('二次验证已禁用');
                    } catch (e) {
                        alert(e.message);
                    }
                };

                const loadNavItems = async () => {
                    try {
                        const res = await api('/user/nav');
                        navItems.value = res.items || [];
                    } catch (e) {
                        navItems.value = [];
                    }
                };

                // 同步 header 用户信息 + 管理员返回按钮
                const syncHeaderUser = () => {
                    const avatarEl = document.getElementById('headerAvatar');
                    const usernameEl = document.getElementById('headerUsername');
                    const adminLink = document.getElementById('adminBackLink');
                    if (user.value && avatarEl && usernameEl) {
                        usernameEl.textContent = user.value.username;
                        if (user.value.avatar) {
                            avatarEl.src = user.value.avatar;
                        } else {
                            avatarEl.src = getGeekAvatar(user.value.username);
                        }
                        // 管理员显示侧边栏"管理后台"按钮
                        if (adminLink) {
                            adminLink.style.display = user.value.role === 'admin' ? '' : 'none';
                        }
                    }
                };

                onMounted(async () => {
                    const userData = await authGuard();
                    if (userData) {
                        user.value = userData;
                        syncHeaderUser();
                        await handleReturnPayment();
                        await loadNavItems();
                        await loadProfile();
                        handleEmailVerification();
                        if (window.location.hash === '#messages' || activeSubTab.value === 'messages') {
                            activeSubTab.value = 'messages';
                            await loadMessages();
                        } else if (activeSubTab.value === 'security') {
                            await loadDevices();
                            await loadTwofaStatus();
                        } else {
                            await loadMemos();
                        }
                        await loadUnreadCount();
                        initPushClient(function(msg) {
                            if (msg.type === 'unread') {
                                unreadCount.value = msg.count;
                            }
                        });
                    }
                });

                onUnmounted(() => {
                });

                watch(activeSubTab, (val) => {
                    localStorage.setItem('ucenter_subtab', val);
                    if (val === 'wallet-transactions') loadTx(1);
                });

                // 监听 user 变化同步 header
                watch(user, () => {
                    syncHeaderUser();
                }, { deep: true });

                return {
                    user,
                    activeSubTab,
                    navItems,
                    currentNavId,
                    switchSubTab,
                    profileForm,
                    memos,
                    memosLoading,
                    editMemoForm,
                    unreadCount,
                    messages,
                    messagesLoading,
                    msgType,
                    currentMsg,
                    parseMarkdown,
                    customAlertMessage,
                    customConfirmMessage,
                    getGeekAvatar,
                    formatDate,
                    logout,
                    loadProfile,
                    loadMemos,
                    updateProfile,
                    handleAvatarUpload,
                    bindEmail,
                    resendVerification,
                    addMemo,
                    editMemo,
                    saveMemo,
                    deleteMemo,
                    loadUnreadCount,
                    loadMessages,
                    viewMessage,
                    markAllRead,
                    deleteMessage,
                    clearAllMessages,
                    trimContent,
                    confirmOk,
                    confirmCancel,
                    devices,
                    devicesLoading,
                    currentDeviceId,
                    loadDevices,
                    revokeDevice,
                    revokeOtherDevices,
                    twofaEnabled,
                    twofaRecoveryCount,
                    twofaSecret,
                    twofaQrcode,
                    twofaSetupCode,
                    twofaDisablePassword,
                    twofaRecoveryCodes,
                    loadTwofaStatus,
                    openTwofaSetup,
                    verifyTwofaSetup,
                    loadTwofaRecoveryCodes,
                    showRecoveryCodes,
                    copyRecoveryCodes,
                    copySingleCode,
                    downloadRecoveryCodes,
                    regenerateRecoveryCodes,
                    openDisableTwofa,
                    disableTwofa,
                    walletBalance, payMethods, rechargeAmount, rechargeMethod, rechargeSubmitting, rechargeError,
                    txList, txTotal, txPage, txFilter, myOrders,
                    submitRecharge, loadTx, copyOrderNo, loadMyOrders
                };
            }
        };

        createApp(App).mount('#app');
    </script>

    <!-- Sidebar Toggle & Theme Switch Script -->
    <script>
    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebarOverlay');
        if (sidebar && overlay) {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
    }

    // Theme toggle
    (function() {
        var btn = document.getElementById('themeToggle');
        var icon = document.getElementById('themeIconSvg');
        if (!btn || !icon) return;
        function updateIcon(theme) {
            if (theme === 'light') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            } else {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
            }
        }
        updateIcon(document.documentElement.getAttribute('data-theme') || 'dark');
        btn.addEventListener('click', function() {
            var current = document.documentElement.getAttribute('data-theme') || 'dark';
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            document.documentElement.style.colorScheme = next;
            var cm = document.querySelector('meta[name="color-scheme"]');
            if (cm) cm.content = next;
            if (document.body) document.body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon(next);
        });
    })();
    </script>

    <!-- Sidebar nav auto-close on mobile (与dashboard统一: 768px阈值) -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.sidebar .nav-item').forEach(function(item) {
            item.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    var sb = document.getElementById('sidebar');
                    var ol = document.getElementById('sidebarOverlay');
                    if (sb) sb.classList.remove('open');
                    if (ol) ol.style.display = 'none';
                    // 如果是<a>标签且有href，延迟导航确保先关闭
                    if (item.tagName === 'A' && item.href && item.href !== window.location.href) {
                        e.preventDefault();
                        setTimeout(function() { window.location.href = item.href; }, 300);
                    }
                }
            });
        });
    });
    </script>
